<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>2048</title>
<meta name="theme-color" content="#06080d">
<link rel="manifest" href="../../manifest.json">
<link rel="icon" href="../../icon-192.png">
<link rel="apple-touch-icon" href="../../icon-192.png">
<link rel="stylesheet" href="../../shared/style.css">
<style>
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: .04em; color: #2fe7f7; margin: 0; }
  .stats { display: flex; gap: 14px; }
  .stat { font-size: 13px; color: #8a93a8; }
  .stat b { color: #fff; }
  .controls { display: flex; gap: 8px; margin-bottom: 12px; }
  .board-wrap {
    width: 100%; aspect-ratio: 1;
    background: rgba(255,255,255,.02);
    border: 1px solid #1b2233; border-radius: 12px;
    padding: 8px;
    display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
    touch-action: none; user-select: none;
  }
  .tile {
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 22px;
  }
  .t0    { background: rgba(255,255,255,.04); }
  .t2    { background: #1a3a4a; color: #e0f8ff; }
  .t4    { background: #1c4455; color: #e0f8ff; }
  .t8    { background: #1f6070; color: #fff; }
  .t16   { background: #1a7e94; color: #fff; }
  .t32   { background: #0ea3b3; color: #fff; }
  .t64   { background: #05bdc9; color: #fff; }
  .t128  { background: #2fe7f7; color: #06222a; font-size: 18px; }
  .t256  { background: #f8ec22; color: #1a1500; font-size: 18px; }
  .t512  { background: #ffa722; color: #1a0a00; font-size: 18px; }
  .t1024 { background: #f55f22; color: #fff; font-size: 15px; }
  .t2048 { background: #f53b3b; color: #fff; font-size: 15px; }
  .thigh { background: #a824c9; color: #fff; font-size: 14px; }
  .msg { text-align: center; font-size: 12px; color: #f8ec22; margin-top: 12px; min-height: 16px; }
  .help { text-align: center; font-size: 12px; color: #5a6275; margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../../">← Back</a>
  <header>
    <h1>2048</h1>
    <div class="stats">
      <div class="stat">Score <b id="score">0</b></div>
      <div class="stat">Best <b id="best">0</b></div>
    </div>
  </header>
  <div class="controls">
    <button class="btn primary" id="newgame">New game</button>
  </div>
  <div class="board-wrap" id="board"></div>
  <div class="msg" id="msg"></div>
  <p class="help">Arrow keys or swipe to slide. Merge matching tiles to reach 2048!</p>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <div class="big" id="ovIcon">😞</div>
    <h2 id="ovTitle">Game Over</h2>
    <p id="ovStats"></p>
    <div class="row">
      <button class="btn primary" id="ovNew">New game</button>
    </div>
  </div>
</div>

<script>
"use strict";
const SIZE = 4;

function tryStore(key, val) { try { localStorage.setItem(key, String(val)); } catch (_) {} }
function tryLoad(key) { try { return localStorage.getItem(key); } catch (_) { return null; } }

const S = {
  grid: [], score: 0,
  best: parseInt(tryLoad("2048-best") || "0", 10),
  won: false, over: false
};

const $ = id => document.getElementById(id);
const board = $("board");

function addTile(g) {
  const empty = [];
  for (let i = 0; i < g.length; i++) if (!g[i]) empty.push(i);
  if (!empty.length) return;
  g[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
}

function newGame() {
  S.grid = Array(SIZE * SIZE).fill(0);
  S.score = 0; S.won = false; S.over = false;
  addTile(S.grid); addTile(S.grid);
  $("overlay").className = "overlay";
  $("msg").textContent = "";
  render();
}

function slideRow(row) {
  const vals = row.filter(v => v);
  let score = 0;
  const out = [];
  let i = 0;
  while (i < vals.length) {
    if (i + 1 < vals.length && vals[i] === vals[i + 1]) {
      const v = vals[i] * 2; out.push(v); score += v; i += 2;
    } else { out.push(vals[i++]); }
  }
  while (out.length < SIZE) out.push(0);
  return { row: out, score };
}

function move(dir) {
  if (S.over) return;
  const g = S.grid.slice();
  let changed = false, gained = 0;

  if (dir === 0 || dir === 1) {
    for (let r = 0; r < SIZE; r++) {
      let row = g.slice(r * SIZE, r * SIZE + SIZE);
      if (dir === 1) row.reverse();
      const { row: nr, score } = slideRow(row);
      if (dir === 1) nr.reverse();
      for (let c = 0; c < SIZE; c++) {
        if (g[r * SIZE + c] !== nr[c]) changed = true;
        g[r * SIZE + c] = nr[c];
      }
      gained += score;
    }
  } else {
    for (let c = 0; c < SIZE; c++) {
      let col = [];
      for (let r = 0; r < SIZE; r++) col.push(g[r * SIZE + c]);
      if (dir === 3) col.reverse();
      const { row: nc, score } = slideRow(col);
      if (dir === 3) nc.reverse();
      for (let r = 0; r < SIZE; r++) {
        if (g[r * SIZE + c] !== nc[r]) changed = true;
        g[r * SIZE + c] = nc[r];
      }
      gained += score;
    }
  }

  if (!changed) return;
  S.grid = g;
  S.score += gained;
  if (S.score > S.best) { S.best = S.score; tryStore("2048-best", S.best); }
  addTile(S.grid);

  if (!S.won && S.grid.includes(2048)) {
    S.won = true;
    $("msg").textContent = "🎉 You reached 2048! Keep going or start a new game.";
  }

  const empty = S.grid.filter(v => !v).length;
  if (!empty) {
    let canMerge = false;
    for (let r = 0; r < SIZE && !canMerge; r++)
      for (let c = 0; c < SIZE && !canMerge; c++) {
        const v = S.grid[r * SIZE + c];
        if (c < SIZE - 1 && S.grid[r * SIZE + c + 1] === v) canMerge = true;
        if (r < SIZE - 1 && S.grid[(r + 1) * SIZE + c] === v) canMerge = true;
      }
    if (!canMerge) {
      S.over = true;
      $("ovIcon").textContent = S.won ? "🏆" : "😞";
      $("ovTitle").textContent = S.won ? "You win!" : "Game Over";
      $("ovStats").textContent = `Score: ${S.score}  ·  Best: ${S.best}`;
      $("overlay").className = "overlay show";
    }
  }
  render();
}

function tileClass(v) {
  if (!v) return "t0";
  if (v <= 2048) return `t${v}`;
  return "thigh";
}

function render() {
  $("score").textContent = S.score;
  $("best").textContent = S.best;
  board.innerHTML = "";
  for (const v of S.grid) {
    const el = document.createElement("div");
    el.className = `tile ${tileClass(v)}`;
    el.textContent = v || "";
    board.appendChild(el);
  }
}

document.addEventListener("keydown", e => {
  const map = { ArrowLeft: 0, ArrowRight: 1, ArrowUp: 2, ArrowDown: 3 };
  if (e.key in map) { e.preventDefault(); move(map[e.key]); }
});

let tx = 0, ty = 0;
board.addEventListener("touchstart", e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });
board.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  move(Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? 0 : 1) : (dy < 0 ? 2 : 3));
}, { passive: true });

$("newgame").addEventListener("click", newGame);
$("ovNew").addEventListener("click", newGame);

newGame();

if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("../../sw.js"));
</script>
</body>
</html>
