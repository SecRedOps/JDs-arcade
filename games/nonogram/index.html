<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Nonogram</title>
<meta name="theme-color" content="#06080d">
<link rel="manifest" href="../../manifest.json">
<link rel="icon" href="../../icon-192.png">
<link rel="apple-touch-icon" href="../../icon-192.png">
<link rel="stylesheet" href="../../shared/style.css">
<style>
  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: .04em; color: #2fe7f7; margin: 0; }
  .pills { display: flex; gap: 8px; margin-bottom: 12px; }
  .pill {
    padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
    background: transparent; color: #6b7488; border: 1px solid #262e44; cursor: pointer;
  }
  .pill.on { background: #2fe7f7; color: #06222a; border-color: #2fe7f7; }

  /* ── Nonogram layout ─────────────────────────────────── */
  .nonogram-outer {
    display: inline-grid;
    gap: 2px;
    /* set by JS: grid-template-columns, grid-template-rows */
    max-width: 100%;
    overflow-x: auto;
  }
  .col-clue-col {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    gap: 2px; padding-bottom: 2px;
  }
  .row-clue-row {
    display: flex; flex-direction: row;
    align-items: center; justify-content: flex-end;
    gap: 3px; padding-right: 4px; min-width: 28px;
  }
  .clue-num {
    font-size: 11px; font-weight: 700; color: #8a93a8; line-height: 1;
  }
  .grid-area {
    display: grid; gap: 2px;
    /* set by JS: grid-template-columns */
  }
  .gcell {
    width: 32px; height: 32px; border-radius: 5px; cursor: pointer; border: none;
    background: rgba(255,255,255,.04);
    border: 1px solid #1b2233;
    transition: background .08s ease;
    font-size: 14px; color: #3a4455;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .gcell.filled { background: #2fe7f7; color: transparent; border-color: #1faabb; }
  .gcell.crossed { background: transparent; color: #3a4455; }
  .gcell.error-fill { background: #f53b3b; border-color: #c02020; }
  .gcell.error-empty { background: rgba(245,59,59,.15); border-color: #c02020; }

  .controls { display: flex; gap: 8px; margin: 12px 0 4px; }
  .hintmsg { font-size: 12px; color: #35e63c; margin-top: 6px; min-height: 16px; }
  .help { font-size: 12px; color: #5a6275; margin-top: 8px; line-height: 1.5; }
  .center { text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../../">← Back</a>
  <header>
    <h1>Nonogram</h1>
    <div class="controls" style="margin:0;gap:6px">
      <button class="btn" id="hint">💡 Hint</button>
      <button class="btn primary" id="newgame">New</button>
    </div>
  </header>
  <div class="pills" id="pills"></div>
  <div id="puzzle-wrap" class="center"></div>
  <div class="hintmsg center" id="hintmsg"></div>
  <p class="help center">Tap to fill · Tap again to mark empty (✕) · Tap again to clear.<br>Fill the correct cells to win!</p>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <div class="big">🖼</div>
    <h2>Solved!</h2>
    <p id="winstats"></p>
    <div class="row">
      <button class="btn primary" id="newwin">New puzzle</button>
    </div>
  </div>
</div>

<script>
"use strict";

// ── Helpers ───────────────────────────────────────────────────────────────────
function shuffle(a) {
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function tryStore(k, v) { try { localStorage.setItem(k, String(v)); } catch (_) {} }
function tryLoad(k)     { try { return localStorage.getItem(k); } catch (_) { return null; } }

// ── Clue utilities ────────────────────────────────────────────────────────────
function lineClue(line) {
  const clue = [];
  let cnt = 0;
  for (const v of line) {
    if (v) cnt++;
    else if (cnt) { clue.push(cnt); cnt = 0; }
  }
  if (cnt) clue.push(cnt);
  return clue; // empty array means all-empty line
}

// All valid 0/1 placements for a clue in a line of length `len`
// given known cells (array of 0/1/-1 where -1 = unknown)
function validLineConfigs(clue, len, known) {
  const results = [];
  function place(ci, pos, current) {
    if (ci === clue.length) {
      // pad with 0s and check remaining known
      const arr = current.slice();
      while (arr.length < len) arr.push(0);
      for (let i = 0; i < len; i++) {
        if (known[i] !== -1 && known[i] !== arr[i]) return;
      }
      results.push(arr);
      return;
    }
    const blockLen = clue[ci];
    const rest = clue.slice(ci + 1).reduce((a, b) => a + b, 0)
                 + Math.max(0, clue.length - ci - 1);
    const maxStart = len - rest - blockLen;
    for (let start = pos; start <= maxStart; start++) {
      // zeros from current.length to start-1, then block of 1s
      const arr = current.slice();
      while (arr.length < start) arr.push(0);
      for (let k = 0; k < blockLen; k++) arr.push(1);
      // check conflicts with known so far
      let ok = true;
      for (let i = 0; i < arr.length; i++) {
        if (known[i] !== -1 && known[i] !== arr[i]) { ok = false; break; }
      }
      if (ok) place(ci + 1, start + blockLen + 1, arr);
    }
  }
  if (clue.length === 0) {
    const arr = Array(len).fill(0);
    let ok = true;
    for (let i = 0; i < len; i++) if (known[i] === 1) { ok = false; break; }
    if (ok) results.push(arr);
  } else {
    place(0, 0, []);
  }
  return results;
}

// ── Constraint-propagation solver ─────────────────────────────────────────────
// grid[r][c] = -1 unknown, 0 empty, 1 filled
// Returns number of solutions found (stops at `limit`)
function countSolutions(rowClues, colClues, limit) {
  const R = rowClues.length, C = colClues.length;
  const grid = Array.from({ length: R }, () => Array(C).fill(-1));

  // Propagate constraints; returns false on contradiction
  function propagate() {
    let changed = true;
    while (changed) {
      changed = false;
      for (let r = 0; r < R; r++) {
        const known = grid[r].slice();
        const cfgs = validLineConfigs(rowClues[r], C, known);
        if (!cfgs.length) return false;
        for (let c = 0; c < C; c++) {
          if (grid[r][c] !== -1) continue;
          const allSame = cfgs.every(cfg => cfg[c] === cfgs[0][c]);
          if (allSame) { grid[r][c] = cfgs[0][c]; changed = true; }
        }
      }
      for (let c = 0; c < C; c++) {
        const known = grid.map(row => row[c]);
        const cfgs = validLineConfigs(colClues[c], R, known);
        if (!cfgs.length) return false;
        for (let r = 0; r < R; r++) {
          if (grid[r][c] !== -1) continue;
          const allSame = cfgs.every(cfg => cfg[r] === cfgs[0][r]);
          if (allSame) { grid[r][c] = cfgs[0][r]; changed = true; }
        }
      }
    }
    return true;
  }

  let count = 0;
  function backtrack() {
    if (count >= limit) return;
    if (!propagate()) return;
    // Find first unknown cell
    let br = -1, bc = -1;
    outer: for (let r = 0; r < R; r++)
      for (let c = 0; c < C; c++)
        if (grid[r][c] === -1) { br = r; bc = c; break outer; }
    if (br === -1) { count++; return; }
    for (const v of [0, 1]) {
      const saved = grid.map(row => row.slice());
      grid[br][bc] = v;
      backtrack();
      for (let r = 0; r < R; r++) grid[r] = saved[r];
      if (count >= limit) return;
    }
  }
  backtrack();
  return count;
}

// Produce a hint: one cell guaranteed by constraint propagation from current player state
function logicHint(rowClues, colClues, playerGrid) {
  const R = rowClues.length, C = colClues.length;
  // Build known from player: 1=filled, -1=unknown, 0=empty(crossed)
  const known = playerGrid.map(row => row.map(v => (v === 1 ? 1 : v === -1 ? 0 : -1)));

  for (let r = 0; r < R; r++) {
    const cfgs = validLineConfigs(rowClues[r], C, known[r]);
    if (!cfgs.length) continue;
    for (let c = 0; c < C; c++) {
      if (known[r][c] !== -1) continue;
      const allSame = cfgs.every(cfg => cfg[c] === cfgs[0][c]);
      if (allSame) return { r, c, val: cfgs[0][c] };
    }
  }
  for (let c = 0; c < C; c++) {
    const col = known.map(row => row[c]);
    const cfgs = validLineConfigs(colClues[c], R, col);
    if (!cfgs.length) continue;
    for (let r = 0; r < R; r++) {
      if (known[r][c] !== -1) continue;
      const allSame = cfgs.every(cfg => cfg[r] === cfgs[0][r]);
      if (allSame) return { r, c, val: cfgs[0][r] };
    }
  }
  return null;
}

// ── Generator ─────────────────────────────────────────────────────────────────
const SIZES = { Small: 5, Medium: 7, Large: 10 };

function generatePuzzle(size) {
  for (let attempt = 0; attempt < 40; attempt++) {
    // Random pattern, ~45-55% fill
    const pattern = Array.from({ length: size }, () =>
      Array.from({ length: size }, () => (Math.random() < 0.5 ? 1 : 0))
    );
    const rowClues = pattern.map(row => lineClue(row));
    const colClues = Array.from({ length: size }, (_, c) => lineClue(pattern.map(row => row[c])));

    // Skip trivial puzzles (all empty or all filled rows/cols)
    if (rowClues.every(c => !c.length) || colClues.every(c => !c.length)) continue;

    const count = countSolutions(rowClues, colClues, 2);
    if (count === 1) return { pattern, rowClues, colClues, size };
  }
  return null;
}

// ── State ─────────────────────────────────────────────────────────────────────
// playerGrid[r][c]: 0=unknown, 1=filled, -1=crossed(empty)
const S = {
  size: 5, pattern: [], rowClues: [], colClues: [],
  player: [], // 0=unknown, 1=filled, -1=crossed
  difficulty: "Small",
  won: false, startTime: 0
};

const $ = id => document.getElementById(id);
const wrap = $("puzzle-wrap");

function buildDOM() {
  wrap.innerHTML = "";
  const { size, rowClues, colClues } = S;

  const outer = document.createElement("div");
  outer.className = "nonogram-outer";

  // Grid layout: (cols+1) columns (1 for row-clues, cols for grid)
  //              (rows+1) rows (1 for col-clues, rows for grid)
  outer.style.gridTemplateColumns = `auto repeat(${size}, 32px)`;
  outer.style.gridTemplateRows    = `auto repeat(${size}, 32px)`;

  // Top-left corner (empty)
  const corner = document.createElement("div");
  outer.appendChild(corner);

  // Column clue cells (top row)
  for (let c = 0; c < size; c++) {
    const div = document.createElement("div");
    div.className = "col-clue-col";
    const clue = colClues[c];
    const nums = clue.length ? clue : [0];
    for (const n of nums) {
      const span = document.createElement("span");
      span.className = "clue-num";
      span.textContent = n;
      div.appendChild(span);
    }
    outer.appendChild(div);
  }

  // Each row: row-clue + cells
  const gridArea = document.createElement("div");
  gridArea.className = "grid-area";
  gridArea.style.gridTemplateColumns = `repeat(${size}, 32px)`;

  for (let r = 0; r < size; r++) {
    // Row clue
    const rowDiv = document.createElement("div");
    rowDiv.className = "row-clue-row";
    const clue = rowClues[r];
    const nums = clue.length ? clue : [0];
    for (const n of nums) {
      const span = document.createElement("span");
      span.className = "clue-num";
      span.textContent = n;
      rowDiv.appendChild(span);
    }
    outer.appendChild(rowDiv);

    // Grid cells
    for (let c = 0; c < size; c++) {
      const btn = document.createElement("button");
      btn.className = "gcell";
      btn.dataset.r = r;
      btn.dataset.c = c;
      btn.addEventListener("click", () => tapCell(r, c));
      gridArea.appendChild(btn);
    }
    outer.appendChild(document.createElement("div")); // placeholder for grid-area column
  }

  // The grid area needs to span correctly. Since the layout is a grid of (size+1) cols x (size+1) rows,
  // each row clue is a separate cell, and the grid cells all go inside gridArea.
  // Let me use a simpler flat approach: place all items linearly.
  // Rebuild using a flat CSS grid.
  outer.innerHTML = "";
  outer.style.gridTemplateColumns = `auto repeat(${size}, 32px)`;
  outer.style.gridTemplateRows    = `auto repeat(${size}, 32px)`;
  outer.style.gap = "2px";
  outer.style.display = "inline-grid";

  // Row 0: corner + col clues
  const corner2 = document.createElement("div");
  outer.appendChild(corner2);
  for (let c = 0; c < size; c++) {
    const div = document.createElement("div");
    div.className = "col-clue-col";
    const clue = colClues[c];
    for (const n of (clue.length ? clue : [0])) {
      const span = document.createElement("span");
      span.className = "clue-num";
      span.textContent = n;
      div.appendChild(span);
    }
    outer.appendChild(div);
  }

  // Rows 1..size: row clue + cells
  for (let r = 0; r < size; r++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "row-clue-row";
    const clue = rowClues[r];
    for (const n of (clue.length ? clue : [0])) {
      const span = document.createElement("span");
      span.className = "clue-num";
      span.textContent = n;
      rowDiv.appendChild(span);
    }
    outer.appendChild(rowDiv);

    for (let c = 0; c < size; c++) {
      const btn = document.createElement("button");
      btn.className = "gcell";
      btn.dataset.r = r;
      btn.dataset.c = c;
      btn.addEventListener("click", () => tapCell(r, c));
      outer.appendChild(btn);
    }
  }

  wrap.appendChild(outer);
}

function tapCell(r, c) {
  if (S.won) return;
  $("hintmsg").textContent = "";
  // Cycle: 0 → 1 → -1 → 0
  const cur = S.player[r][c];
  S.player[r][c] = cur === 0 ? 1 : cur === 1 ? -1 : 0;
  checkWin();
  render();
}

function checkWin() {
  for (let r = 0; r < S.size; r++)
    for (let c = 0; c < S.size; c++)
      if ((S.player[r][c] === 1) !== (S.pattern[r][c] === 1)) return;
  S.won = true;
  const elapsed = Math.round((Date.now() - S.startTime) / 1000);
  const mins = (elapsed / 60) | 0, secs = elapsed % 60;
  const timeStr = mins ? `${mins}m ${secs}s` : `${secs}s`;
  const key = `nonogram-best-${S.difficulty}`;
  const prev = parseInt(tryLoad(key) || "0", 10);
  if (!prev || elapsed < prev) tryStore(key, elapsed);
  const best = parseInt(tryLoad(key) || "0", 10);
  const bm = (best / 60) | 0, bs = best % 60;
  const bestStr = bm ? `${bm}m ${bs}s` : `${bs}s`;
  $("winstats").textContent = `${timeStr} · Best: ${bestStr}`;
  $("overlay").className = "overlay show";
}

function showHint() {
  $("hintmsg").textContent = "";
  const h = logicHint(S.rowClues, S.colClues, S.player);
  if (!h) {
    $("hintmsg").textContent = "No simple deduction available — try a different cell.";
    return;
  }
  S.player[h.r][h.c] = h.val === 1 ? 1 : -1;
  checkWin();
  render();
  $("hintmsg").textContent = `Hint: cell (${h.r + 1},${h.c + 1}) is ${h.val ? "filled" : "empty"}.`;
}

function render() {
  if (!wrap.firstChild) return;
  const outer = wrap.firstChild;
  const cells = outer.querySelectorAll(".gcell");
  cells.forEach(btn => {
    const r = parseInt(btn.dataset.r, 10), c = parseInt(btn.dataset.c, 10);
    const pv = S.player[r][c];
    let cls = "gcell";
    if (pv === 1) cls += " filled";
    else if (pv === -1) cls += " crossed";
    btn.className = cls;
    btn.textContent = pv === -1 ? "✕" : "";
  });
}

function newGame(diff) {
  if (diff) S.difficulty = diff;
  S.size = SIZES[S.difficulty] || 5;
  $("hintmsg").textContent = "";

  let puzzle = null;
  for (let t = 0; t < 3 && !puzzle; t++) puzzle = generatePuzzle(S.size);
  if (!puzzle) {
    $("hintmsg").textContent = "Could not generate a unique puzzle — try again.";
    return;
  }

  S.pattern  = puzzle.pattern;
  S.rowClues = puzzle.rowClues;
  S.colClues = puzzle.colClues;
  S.player   = Array.from({ length: S.size }, () => Array(S.size).fill(0));
  S.won = false;
  S.startTime = Date.now();
  $("overlay").className = "overlay";
  renderPills();
  buildDOM();
  render();
}

function renderPills() {
  const p = $("pills");
  p.innerHTML = "";
  for (const d of ["Small", "Medium", "Large"]) {
    const b = document.createElement("button");
    b.className = "pill" + (d === S.difficulty ? " on" : "");
    b.textContent = d;
    b.addEventListener("click", () => newGame(d));
    p.appendChild(b);
  }
}

$("newgame").addEventListener("click", () => newGame());
$("hint").addEventListener("click", showHint);
$("newwin").addEventListener("click", () => newGame());

newGame();

if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("../../sw.js"));
</script>
</body>
</html>
