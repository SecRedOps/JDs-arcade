<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Chasm</title>
<meta name="theme-color" content="#06080d">
<link rel="manifest" href="../../manifest.json">

<style>
  body { padding: 0; overflow: hidden; }
  canvas { display: block; position: fixed; inset: 0; touch-action: none; cursor: none; }

  /* ── HUD ───────────────────────────────────────────── */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    padding: max(12px, env(safe-area-inset-top)) 12px 0;
  }
  .hud-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .hud-pill {
    background: rgba(6,8,13,.82); border: 1px solid rgba(47,231,247,.22);
    border-radius: 10px; padding: 5px 10px;
    font-size: 12px; font-weight: 700; color: #cfd6e4; line-height: 1.5;
    white-space: nowrap;
  }
  .hud-pill .acc { color: #2fe7f7; font-size: 14px; }
  #scoreboard { font-size: 11px; min-width: 90px; text-align: right; }
  #scoreboard .sb-row { line-height: 1.7; }
  #scoreboard .sb-you { color: #2fe7f7; }
  #tier-banner {
    position: fixed; left: 50%; transform: translateX(-50%);

    text-decoration: none;
    background: rgba(6,8,13,.8); border: 1px solid #262e44;
    border-radius: 999px; padding: 5px 12px;
  }

  /* ── Respawn notice ────────────────────────────────── */
  #respawn-notice {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    background: rgba(6,8,13,.85); border: 1px solid rgba(248,236,34,.4);
    border-radius: 14px; padding: 14px 22px;
    font-size: 15px; font-weight: 700; color: #f8ec22;
    text-align: center; display: none; pointer-events: none;
    z-index: 15;
  }

  /* ── How-to banner ─────────────────────────────────── */
  #how-to {
    position: fixed; bottom: max(14px, env(safe-area-inset-bottom));

    font-size: 11px; color: rgba(255,255,255,.45);

  }
</style>

<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-row">
    <div class="hud-pill">⏱ <span class="acc" id="timer">2:00</span><br>⭐ <span class="acc" id="score">0</span></div>
    <div class="hud-pill" id="scoreboard"></div>
  </div>
</div>
<div id="tier-banner"></div>

<div id="respawn-notice">Swallowed!<br><span id="respawn-count">Respawning in 3…</span></div>
<div id="how-to">Drag anywhere to move</div>
<a id="back-btn" href="../../">← Hub</a>

<!-- Game-over overlay (uses shared .overlay / .card) -->
<div class="overlay" id="overlay">
  <div class="card">
    <div class="big">🕳</div>
    <h2>Round Over</h2>
    <p id="ov-stats"></p>
    <div class="row">
      <button class="btn primary" id="btn-replay">Play Again</button>
      <a class="btn" href="../../">Hub</a>
    </div>
  </div>
</div>

<script>
"use strict";

// ══════════════════════════════════════════════════════════════════════════════
// ── CONFIG  (tune everything here) ───────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const CFG = {
  mapW: 2400, mapH: 2400,   // world size in pixels
  blockPitch: 240,           // road grid pitch (block + road)
  roadW: 28,                 // road stripe width
  roundTime: 120,            // seconds per round
  playerSpeed: 190,          // px / s
  aiSpeed: 155,
  aiCount: 4,
  playerStartR: 28,          // starting hole radius
  growthFactor: 0.22,        // radius gained = obj.r * this when swallowed
  holeMergeRatio: 1.15,      // bigger hole must be this ratio larger to swallow smaller
  respawnTime: 3,            // seconds player is penalised after being swallowed
  respawnRFraction: 0.65,    // player keeps this fraction of radius on respawn
  camLerp: 9,                // camera spring constant (units/s)
  maxDt: 1 / 20,             // cap dt to prevent spiral-of-death

  // ── Tier thresholds (hole.r must EXCEED this to enter tier) ────────────────
  // tier 0 = start, tier 1 = small stuff, …
  tierR: [0, 14, 32, 62, 105, 999],
  tierNames: ["Pebble", "Pothole", "Sinkhole", "Chasm", "Abyss"],
  tierColors: ["#8a93a8", "#35e63c", "#f8ec22", "#ff8c35", "#ff35b5"],

  // ── Object types ───────────────────────────────────────────────────────────
  // r = footprint radius; shape: tri | circ | rect | tree | bldg | tall
  objs: [
    { label:"Cone",   r:12, tier:0, pts:10,  color:"#f39c12", shape:"tri",  count:52 },
    { label:"Bush",   r:16, tier:0, pts:15,  color:"#27ae60", shape:"circ", count:42 },
    { label:"Person", r:13, tier:0, pts:12,  color:"#e8a87a", shape:"pers", count:36 },
    { label:"Bench",  r:22, tier:1, pts:40,  color:"#8d6e63", shape:"rect", count:26 },
    { label:"Car",    r:28, tier:1, pts:60,  color:"#c0392b", shape:"car",  count:24 },
    { label:"Tree",   r:24, tier:1, pts:45,  color:"#2ecc71", shape:"tree", count:22 },
    { label:"Kiosk",  r:46, tier:2, pts:130, color:"#e6b800", shape:"bldg", count:16 },
    { label:"Shop",   r:58, tier:2, pts:210, color:"#3498db", shape:"bldg", count:12 },
    { label:"Block",  r:90, tier:3, pts:380, color:"#9b59b6", shape:"tall", count:10 },
    { label:"Tower",  r:120,tier:3, pts:650, color:"#e74c3c", shape:"tall", count:7  },
  ],
  maxObjR: 120,              // largest obj radius (for grid query padding)

  aiColors: ["#ff6b9d","#ffd93d","#6bcb77","#ff922b","#a9e4f7"],
  aiNames:  ["Rift α","Rift β","Rift γ","Rift δ","Rift ε"],
};

// ══════════════════════════════════════════════════════════════════════════════
// ── UTILS ─────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
function tryStore(k, v) { try { localStorage.setItem(k, String(v)); } catch(_) {} }
function tryLoad(k) { try { return localStorage.getItem(k); } catch(_) { return null; } }

// ══════════════════════════════════════════════════════════════════════════════
// ── SPATIAL GRID ──────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
class SpatialGrid {
  constructor(w, h, cell) {
    this.cell = cell;
    this.cols = Math.ceil(w / cell);
    this.rows = Math.ceil(h / cell);
    this._g = Array.from({ length: this.cols * this.rows }, () => []);
    this._buf = []; // reused query result — no per-frame alloc
  }
  _idx(x, y) { return (y / this.cell | 0) * this.cols + (x / this.cell | 0); }
  insert(obj) {
    const idx = this._idx(obj.x, obj.y);
    if (idx >= 0 && idx < this._g.length) this._g[idx].push(obj);
  }
  remove(obj) {
    const idx = this._idx(obj.x, obj.y);
    if (idx < 0 || idx >= this._g.length) return;
    const cell = this._g[idx];
    const i = cell.indexOf(obj);
    if (i >= 0) { cell[i] = cell[cell.length - 1]; cell.pop(); }
  }
  query(x, y, r) {
    const buf = this._buf; buf.length = 0;
    const c0 = clamp((x - r) / this.cell | 0, 0, this.cols - 1);
    const c1 = clamp((x + r) / this.cell | 0, 0, this.cols - 1);
    const r0 = clamp((y - r) / this.cell | 0, 0, this.rows - 1);
    const r1 = clamp((y + r) / this.cell | 0, 0, this.rows - 1);
    for (let ry = r0; ry <= r1; ry++)
      for (let cx = c0; cx <= c1; cx++) {
        const cell = this._g[ry * this.cols + cx];
        for (let i = 0; i < cell.length; i++) buf.push(cell[i]);
      }
    return buf;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ── CANVAS & DPR SETUP ────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const dpr = Math.min(window.devicePixelRatio || 1, 2);
let VW = 0, VH = 0; // viewport in CSS px

function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.style.width  = VW + "px";
  canvas.style.height = VH + "px";
  canvas.width  = VW * dpr;
  canvas.height = VH * dpr;
}
resize();
window.addEventListener("resize", resize);

// ══════════════════════════════════════════════════════════════════════════════
// ── MAP BLOCK COLOURS ─────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const ROAD_COLOR  = "#a09890";
const BLOCK_PAL   = ["#e8d5a3","#e0cf98","#ddd094","#c8ddb0","#d8d5ca","#ead8a8","#dfe0c4"];

// ══════════════════════════════════════════════════════════════════════════════
// ── WORLD STATE ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
let grid;         // SpatialGrid
let objs;         // world object array
let holes;        // player hole + AI holes
let player;       // ref to player's hole
let cam;          // {x,y} — top-left of viewport in world coords
let timeLeft;
let gameOver;
let bestScore;

// Particle pool (eat-flash effect)
const POOL_SIZE = 60;
const particles = Array.from({ length: POOL_SIZE }, () =>
  ({ active: false, x: 0, y: 0, r: 0, maxR: 0, t: 0, dur: 0, color: "#fff" })
);
function spawnParticle(x, y, maxR, color) {
  for (let i = 0; i < POOL_SIZE; i++) {
    if (!particles[i].active) {
      const p = particles[i];
      p.active = true; p.x = x; p.y = y; p.r = 0;
      p.maxR = maxR; p.t = 0; p.dur = 0.35; p.color = color;
      return;
    }
  }
}

// ── Hole factory ──────────────────────────────────────────────────────────────
function makeHole(x, y, r, isPlayer, name, color) {
  return {
    x, y, r,
    isPlayer, name, color,
    score: 0,
    vx: 0, vy: 0,
    tier: 0,
    respawning: false, respawnTimer: 0,
    wanderAngle: Math.random() * Math.PI * 2,
    wanderTimer: 0,
    eatAnim: 0,   // wobble on eating
  };
}

// ── Object factory ────────────────────────────────────────────────────────────
function makeObj(type, x, y) {
  return {
    x, y, r: type.r, tier: type.tier, pts: type.pts,
    color: type.color, shape: type.shape, label: type.label,
    eaten: false,
    swallowing: false, swallowT: 0, swallowDur: 0.4,
    swallowHole: null,
    sx: x, sy: y,       // start pos for swallow anim
    origR: type.r,
  };
}

// ══════════════════════════════════════════════════════════════════════════════
// ── OBJECT PLACEMENT ──────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function placeObjects() {
  const list = [];
  const half = CFG.roadW / 2;
  const inner = CFG.blockPitch - CFG.roadW;

  for (const type of CFG.objs) {
    let placed = 0, tries = 0;
    while (placed < type.count && tries < type.count * 30) {
      tries++;
      const wx = Math.random() * CFG.mapW;
      const wy = Math.random() * CFG.mapH;

      // Reject if on road
      const bx = wx % CFG.blockPitch, by = wy % CFG.blockPitch;
      if (bx < half + type.r + 4 || bx > CFG.blockPitch - half - type.r - 4) continue;
      if (by < half + type.r + 4 || by > CFG.blockPitch - half - type.r - 4) continue;

      // Reject if overlapping existing objects (generation-time O(n), not per-frame)
      let ok = true;
      for (let i = list.length - 1; i >= Math.max(0, list.length - 80); i--) {
        const o = list[i];
        const dx = o.x - wx, dy = o.y - wy;
        if (dx*dx + dy*dy < (o.r + type.r + 6) * (o.r + type.r + 6)) { ok = false; break; }
      }
      if (!ok) continue;

      list.push(makeObj(type, wx, wy));
      placed++;
    }
  }
  return list;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── INPUT ─────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const keys = {};
const touch = { active: false, x: 0, y: 0 };

document.addEventListener("keydown", e => { keys[e.code] = true; });
document.addEventListener("keyup",   e => { keys[e.code] = false; });

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  touch.active = true;
  touch.x = e.touches[0].clientX;
  touch.y = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  touch.x = e.touches[0].clientX;
  touch.y = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener("touchend", e => {
  e.preventDefault();
  touch.active = false;
}, { passive: false });

function getPlayerInput() {
  // Touch: move toward touch position in world space
  if (touch.active) {
    const wx = touch.x + cam.x, wy = touch.y + cam.y;
    const dx = wx - player.x, dy = wy - player.y;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d > 8) {
      const speed = Math.min(1, d / 60); // analog: ramp over 60 CSS px
      return { x: (dx/d) * speed, y: (dy/d) * speed };
    }
    return null;
  }
  // Keyboard
  let kx = 0, ky = 0;
  if (keys["ArrowLeft"]  || keys["KeyA"]) kx -= 1;
  if (keys["ArrowRight"] || keys["KeyD"]) kx += 1;
  if (keys["ArrowUp"]    || keys["KeyW"]) ky -= 1;
  if (keys["ArrowDown"]  || keys["KeyS"]) ky += 1;
  if (!kx && !ky) return null;
  const d = Math.sqrt(kx*kx + ky*ky);
  return { x: kx/d, y: ky/d };
}

// ══════════════════════════════════════════════════════════════════════════════
// ── PHYSICS ───────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function moveHole(hole, dx, dy, dt) {
  const spd = (hole.isPlayer ? CFG.playerSpeed : CFG.aiSpeed) * (1 + hole.r * 0.0004);
  let nx = hole.x + dx * spd * dt;
  let ny = hole.y + dy * spd * dt;

  // Map boundary
  nx = clamp(nx, hole.r, CFG.mapW - hole.r);
  ny = clamp(ny, hole.r, CFG.mapH - hole.r);

  // Slide around objects larger than this hole (can't eat → solid)
  const check = grid.query(nx, ny, hole.r + CFG.maxObjR);
  for (let i = 0; i < check.length; i++) {
    const o = check[i];
    if (o.eaten || o.swallowing) continue;
    if (o.r < hole.r) continue; // edible, not solid
    const odx = nx - o.x, ody = ny - o.y;
    const d2 = odx*odx + ody*ody;
    const minD = hole.r + o.r;
    if (d2 < minD * minD && d2 > 0.0001) {
      const d = Math.sqrt(d2);
      nx = o.x + odx/d * minD;
      ny = o.y + ody/d * minD;
    }
  }

  hole.x = clamp(nx, hole.r, CFG.mapW - hole.r);
  hole.y = clamp(ny, hole.r, CFG.mapH - hole.r);
}

function eatObject(hole, obj) {
  obj.eaten = true;
  obj.swallowing = true;
  obj.swallowT = 0;
  obj.swallowDur = 0.35 + Math.random() * 0.1;
  obj.swallowHole = hole;
  obj.sx = obj.x; obj.sy = obj.y;
  grid.remove(obj);
  spawnParticle(obj.x, obj.y, obj.r * 1.8, obj.color);
  hole.eatAnim = 0.18; // wobble amount
}

function checkEating(hole) {
  if (hole.respawning) return;
  const check = grid.query(hole.x, hole.y, hole.r + CFG.maxObjR);
  for (let i = 0; i < check.length; i++) {
    const o = check[i];
    if (o.eaten || o.swallowing) continue;
    if (o.r >= hole.r) continue;
    const dx = o.x - hole.x, dy = o.y - hole.y;
    if (dx*dx + dy*dy < hole.r * hole.r) eatObject(hole, o);
  }
}

function checkHoleCollisions() {
  for (let i = 0; i < holes.length; i++) {
    const a = holes[i];
    if (a.respawning) continue;
    for (let j = i + 1; j < holes.length; j++) {
      const b = holes[j];
      if (b.respawning) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx*dx + dy*dy;
      const big = a.r >= b.r ? a : b;
      const small = a.r >= b.r ? b : a;
      if (big.r < small.r * CFG.holeMergeRatio) continue; // too close in size
      if (d2 < big.r * big.r * 0.7) {
        big.r += small.r * 0.25;
        big.score += Math.floor(small.score * 0.15);
        spawnParticle(small.x, small.y, small.r * 2, small.color);
        if (small.isPlayer) {
          respawnPlayer(small);
        } else {
          small.respawning = true;
          small.respawnTimer = 6 + Math.random() * 4;
          small.r = CFG.playerStartR * (0.7 + Math.random() * 0.4);
          small.score = 0;
        }
      }
    }
  }
}

function getTier(r) {
  for (let i = CFG.tierR.length - 2; i >= 0; i--)
    if (r > CFG.tierR[i]) return i;
  return 0;
}
function getTierProgress(r) {
  const t = getTier(r);
  const lo = CFG.tierR[t], hi = CFG.tierR[t + 1] || lo + 1;
  return (r - lo) / (hi - lo);
}

// ══════════════════════════════════════════════════════════════════════════════
// ── AI ────────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function updateAI(hole, dt) {
  if (hole.respawning) {
    hole.respawnTimer -= dt;
    if (hole.respawnTimer <= 0) {
      hole.respawning = false;
      hole.x = CFG.roadW/2 + Math.random() * (CFG.mapW - CFG.roadW);
      hole.y = CFG.roadW/2 + Math.random() * (CFG.mapH - CFG.roadW);
    }
    return;
  }

  // Update wander
  hole.wanderTimer -= dt;
  if (hole.wanderTimer <= 0) {
    hole.wanderAngle += (Math.random() - 0.5) * 1.8;
    hole.wanderTimer = 1.5 + Math.random() * 2;
  }

  // Find nearest edible object
  let target = null, bestD2 = Infinity;
  const search = grid.query(hole.x, hole.y, hole.r + 400);
  for (let i = 0; i < search.length; i++) {
    const o = search[i];
    if (o.eaten || o.swallowing || o.r >= hole.r) continue;
    const dx = o.x - hole.x, dy = o.y - hole.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bestD2) { bestD2 = d2; target = o; }
  }

  // Check for smaller player to hunt
  let hunt = null;
  for (let i = 0; i < holes.length; i++) {
    const h = holes[i];
    if (h === hole || h.respawning) continue;
    if (h.r * CFG.holeMergeRatio > hole.r) continue;
    const dx = h.x - hole.x, dy = h.y - hole.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < 350 * 350 && (!hunt || d2 < bestD2)) hunt = h;
  }

  let mx, my;
  if (hunt) {
    const dx = hunt.x - hole.x, dy = hunt.y - hole.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    mx = dx/d; my = dy/d;
  } else if (target) {
    const dx = target.x - hole.x, dy = target.y - hole.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    // Add small noise so AI doesn't move in perfectly straight lines
    const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.25;
    mx = Math.cos(ang); my = Math.sin(ang);
  } else {
    mx = Math.cos(hole.wanderAngle);
    my = Math.sin(hole.wanderAngle);
  }

  // Flee from bigger holes nearby
  for (let i = 0; i < holes.length; i++) {
    const h = holes[i];
    if (h === hole || h.respawning || h.r < hole.r * CFG.holeMergeRatio) continue;
    const dx = hole.x - h.x, dy = hole.y - h.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    if (d < h.r * 2.5) { mx += (dx/d) * 2; my += (dy/d) * 2; }
  }

  const len = Math.sqrt(mx*mx + my*my) || 1;
  moveHole(hole, mx/len, my/len, dt);
}

// ══════════════════════════════════════════════════════════════════════════════
// ── RENDERING ─────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function drawMap() {
  ctx.fillStyle = ROAD_COLOR;
  ctx.fillRect(0, 0, VW, VH);

  const p = CFG.blockPitch, half = CFG.roadW / 2;
  const inner = p - CFG.roadW;
  const bxMin = Math.max(0, Math.floor((cam.x - half) / p));
  const bxMax = Math.min(Math.ceil(CFG.mapW / p), Math.ceil((cam.x + VW + half) / p));
  const byMin = Math.max(0, Math.floor((cam.y - half) / p));
  const byMax = Math.min(Math.ceil(CFG.mapH / p), Math.ceil((cam.y + VH + half) / p));

  for (let bx = bxMin; bx <= bxMax; bx++) {
    for (let by = byMin; by <= byMax; by++) {
      ctx.fillStyle = BLOCK_PAL[(bx * 7 + by * 13) % BLOCK_PAL.length];
      ctx.fillRect(bx * p + half - cam.x, by * p + half - cam.y, inner, inner);
    }
  }

  // Road centre dashes (subtle)
  ctx.save();
  ctx.strokeStyle = "rgba(190,185,175,0.55)";
  ctx.setLineDash([16, 16]);
  ctx.lineWidth = 1.5;
  for (let bx = 0; bx * p <= CFG.mapW; bx++) {
    const sx = bx * p - cam.x;
    if (sx < -20 || sx > VW + 20) continue;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, VH); ctx.stroke();
  }
  for (let by = 0; by * p <= CFG.mapH; by++) {
    const sy = by * p - cam.y;
    if (sy < -20 || sy > VH + 20) continue;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(VW, sy); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawObj(o, sx, sy, scale, alpha) {
  if (scale <= 0.02) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(sx, sy);
  ctx.scale(scale, scale);

  const r = o.origR, c = o.color;
  switch (o.shape) {
    case "tri": // traffic cone
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r*0.75, r*0.55); ctx.lineTo(-r*0.75, r*0.55); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.fillRect(-r*0.6, r*0.1, r*1.2, r*0.18);
      ctx.fillStyle = "#333"; ctx.fillRect(-r*0.6, r*0.55, r*1.2, r*0.18);
      break;
    case "circ": // bush (ring of circles)
      ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.arc(r*0.28, -r*0.22, r*0.38, 0, Math.PI*2); ctx.fill();
      break;
    case "pers": { // top-down person silhouette
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(0, r*0.15, r*0.55, r*0.8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#bf7350";
      ctx.beginPath(); ctx.arc(0, -r*0.55, r*0.42, 0, Math.PI*2); ctx.fill();
      break;
    }
    case "rect": // bench / small crate
      ctx.fillStyle = c;
      ctx.fillRect(-r, -r*0.55, r*2, r*1.1);
      ctx.strokeStyle = "rgba(0,0,0,0.28)"; ctx.lineWidth = 1.5; ctx.strokeRect(-r, -r*0.55, r*2, r*1.1);
      break;
    case "car": { // top-down car
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.roundRect(-r*0.7, -r, r*1.4, r*2, r*0.3); ctx.fill();
      ctx.fillStyle = "rgba(140,200,255,0.85)";
      ctx.fillRect(-r*0.55, -r*0.65, r*1.1, r*0.6);  // windscreen
      ctx.fillRect(-r*0.55, r*0.1, r*1.1, r*0.5);    // rear screen
      ctx.fillStyle = "#e0d800";
      ctx.fillRect(-r*0.75, -r*0.95, r*0.22, r*0.18);
      ctx.fillRect(r*0.53, -r*0.95, r*0.22, r*0.18);
      break;
    }
    case "tree": // top-down tree
      ctx.fillStyle = "#7a5230"; ctx.fillRect(-r*0.15, -r*0.2, r*0.3, r*0.7);
      ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, -r*0.1, r*0.82, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.arc(r*0.22, r*0.12, r*0.38, 0, Math.PI*2); ctx.fill();
      break;
    case "bldg": { // small building (top-down)
      ctx.fillStyle = c; ctx.fillRect(-r, -r, r*2, r*2);
      ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 2; ctx.strokeRect(-r, -r, r*2, r*2);
      ctx.fillStyle = "rgba(255,255,180,0.85)";
      const ws = r*0.36, wg = r*0.28;
      for (let row = 0; row < 2; row++) for (let col = 0; col < 2; col++)
        ctx.fillRect(-r + wg + col*(ws+wg), -r + wg + row*(ws+wg), ws, ws);
      break;
    }
    case "tall": { // large building
      ctx.fillStyle = c; ctx.fillRect(-r*0.78, -r, r*1.56, r*2);
      ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 2; ctx.strokeRect(-r*0.78, -r, r*1.56, r*2);
      ctx.fillStyle = "rgba(255,255,180,0.88)";
      const tw = r*0.28, th = r*0.22, tg = r*0.18;
      for (let row = 0; row < 3; row++) for (let col = 0; col < 2; col++)
        ctx.fillRect(-r*0.48 + col*(tw+tg), -r*0.88 + row*(th+tg), tw, th);
      break;
    }
  }
  ctx.restore();
}

function drawObjects() {
  for (let i = 0; i < objs.length; i++) {
    const o = objs[i];
    if (o.eaten && !o.swallowing) continue;

    if (o.swallowing) {
      const t = o.swallowT / o.swallowDur;
      const ease = 1 - (1-t)*(1-t);
      const hx = o.swallowHole.x - cam.x, hy = o.swallowHole.y - cam.y;
      const sx = o.sx - cam.x + (hx - (o.sx - cam.x)) * ease;
      const sy = o.sy - cam.y + (hy - (o.sy - cam.y)) * ease;
      drawObj(o, sx, sy, 1 - ease * 0.95, 1 - ease);
      continue;
    }

    const sx = o.x - cam.x, sy = o.y - cam.y;
    if (sx + o.r < 0 || sx - o.r > VW || sy + o.r < 0 || sy - o.r > VH) continue;
    drawObj(o, sx, sy, 1, 1);
  }
}

function drawParticles() {
  for (let i = 0; i < POOL_SIZE; i++) {
    const p = particles[i];
    if (!p.active) continue;
    const frac = p.t / p.dur;
    ctx.beginPath();
    ctx.arc(p.x - cam.x, p.y - cam.y, p.r * frac, 0, Math.PI*2);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2.5 * (1 - frac);
    ctx.globalAlpha = (1 - frac) * 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawHole(h) {
  if (h.respawning && h.respawnTimer > 0) return;
  const sx = h.x - cam.x, sy = h.y - cam.y;
  if (sx + h.r < -20 || sx - h.r > VW + 20 || sy + h.r < -20 || sy - h.r > VH + 20) return;

  const wobble = 1 + Math.sin(Date.now() / 250) * 0.025 + h.eatAnim;
  const dispR = h.r * wobble;

  // Outer shadow
  const glow = ctx.createRadialGradient(sx, sy, dispR * 0.5, sx, sy, dispR * 1.45);
  glow.addColorStop(0, "rgba(0,0,0,0)");
  glow.addColorStop(0.6, "rgba(0,0,0,0.14)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx, sy, dispR * 1.45, 0, Math.PI*2); ctx.fill();

  // Hole depth gradient
  const depth = ctx.createRadialGradient(sx - dispR*0.15, sy - dispR*0.15, dispR*0.05,
                                          sx, sy, dispR);
  depth.addColorStop(0, "#000000");
  depth.addColorStop(0.6, "#06080d");
  depth.addColorStop(1, "#0c1528");
  ctx.fillStyle = depth;
  ctx.beginPath(); ctx.arc(sx, sy, dispR, 0, Math.PI*2); ctx.fill();

  // Coloured rim
  const rimW = Math.max(2.5, dispR * 0.065);
  ctx.beginPath(); ctx.arc(sx, sy, dispR, 0, Math.PI*2);
  ctx.strokeStyle = h.color; ctx.lineWidth = rimW; ctx.stroke();

  // Growth progress ring (player only)
  if (h.isPlayer) {
    const prog = getTierProgress(h.r);
    const startAngle = -Math.PI / 2;
    ctx.beginPath();
    ctx.arc(sx, sy, dispR + rimW + 2, startAngle, startAngle + prog * Math.PI * 2);
    ctx.strokeStyle = "rgba(47,231,247,0.55)"; ctx.lineWidth = 3; ctx.stroke();
  }

  // Name label
  const fontSize = clamp(dispR * 0.28, 9, 13);
  ctx.font = `bold ${fontSize}px system-ui,sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "bottom";
  ctx.fillStyle = "rgba(255,255,255,0.88)";
  ctx.fillText(h.name, sx, sy - dispR - rimW - 3);
}

function drawHoles() {
  const sorted = holes.slice().sort((a, b) => a.r - b.r);
  for (let i = 0; i < sorted.length; i++) drawHole(sorted[i]);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  const mins = (timeLeft / 60) | 0;
  const secs = timeLeft % 60 | 0;
  document.getElementById("timer").textContent =
    mins + ":" + (secs < 10 ? "0" : "") + secs;
  document.getElementById("score").textContent = player.score;

  const sorted = holes.slice().sort((a, b) => b.r - a.r);
  const sb = document.getElementById("scoreboard");
  let html = "";
  for (let i = 0; i < Math.min(sorted.length, 5); i++) {
    const h = sorted[i];
    const rank = i + 1;
    const isMe = h.isPlayer;
    const rad = h.r | 0;
    html += `<div class="sb-row${isMe ? " sb-you" : ""}">${rank}. ${h.name} <b>${rad}</b></div>`;
  }
  sb.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── TIER BANNER ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
let lastTier = 0;
let bannerTimer = 0;
const banner = document.getElementById("tier-banner");

function checkTierUp() {
  const t = getTier(player.r);
  if (t > lastTier) {
    lastTier = t;
    banner.textContent = `⬆ ${CFG.tierNames[t]} tier unlocked!`;
    banner.style.opacity = "1";
    bannerTimer = 2.2;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ── RESPAWN ───────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const respawnNotice = document.getElementById("respawn-notice");
const respawnCount  = document.getElementById("respawn-count");

function respawnPlayer(hole) {
  hole.respawning = true;
  hole.respawnTimer = CFG.respawnTime;
  hole.r = Math.max(CFG.playerStartR, hole.r * CFG.respawnRFraction);
  hole.score = Math.floor(hole.score * 0.8);

  // Find safe spawn position
  let bx = 0, by = 0;
  let tries = 0;
  do {
    bx = CFG.roadW/2 + Math.random() * (CFG.mapW - CFG.roadW);
    by = CFG.roadW/2 + Math.random() * (CFG.mapH - CFG.roadW);
    tries++;
  } while (tries < 20 && holes.some(h => !h.isPlayer && !h.respawning &&
      (h.x-bx)*(h.x-bx) + (h.y-by)*(h.y-by) < 300*300));
  hole.x = bx; hole.y = by;
  respawnNotice.style.display = "block";
}

// ══════════════════════════════════════════════════════════════════════════════
// ── GAME LOOP ─────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
let rafId = null;
let lastTs = 0;
let paused = false;

document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
  if (!paused) lastTs = 0; // reset dt on resume to avoid big jump
});

function loop(ts) {
  rafId = requestAnimationFrame(loop);
  if (paused || gameOver) return;

  const dt = lastTs ? Math.min((ts - lastTs) / 1000, CFG.maxDt) : 0.016;
  lastTs = ts;

  // ── Update time ────────────────────────────────────────────────────────────
  if (!player.respawning) {
    timeLeft -= dt;
    if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
  }

  // ── Update respawn timer ───────────────────────────────────────────────────
  if (player.respawning) {
    player.respawnTimer -= dt;
    const cnt = Math.ceil(player.respawnTimer);
    respawnCount.textContent = `Respawning in ${cnt}…`;
    if (player.respawnTimer <= 0) {
      player.respawning = false;
      respawnNotice.style.display = "none";
    }
  }

  // ── Player movement ────────────────────────────────────────────────────────
  if (!player.respawning) {
    const inp = getPlayerInput();
    if (inp) moveHole(player, inp.x, inp.y, dt);
    checkEating(player);
    checkTierUp();
  }

  // ── AI ─────────────────────────────────────────────────────────────────────
  for (let i = 1; i < holes.length; i++) {
    updateAI(holes[i], dt);
    checkEating(holes[i]);
  }

  // ── Hole-hole collisions ───────────────────────────────────────────────────
  checkHoleCollisions();

  // ── Swallow animation progress ─────────────────────────────────────────────
  for (let i = 0; i < objs.length; i++) {
    const o = objs[i];
    if (!o.swallowing) continue;
    o.swallowT += dt;
    if (o.swallowT >= o.swallowDur) {
      o.swallowing = false;
      const h = o.swallowHole;
      h.r += o.origR * CFG.growthFactor;
      h.score += o.pts;
    }
  }

  // ── Particle update ────────────────────────────────────────────────────────
  for (let i = 0; i < POOL_SIZE; i++) {
    const p = particles[i];
    if (!p.active) continue;
    p.t += dt; if (p.t >= p.dur) p.active = false;
    p.r = p.maxR * (p.t / p.dur);
  }

  // ── Eat-anim decay ─────────────────────────────────────────────────────────
  for (let i = 0; i < holes.length; i++) {
    if (holes[i].eatAnim > 0) holes[i].eatAnim = Math.max(0, holes[i].eatAnim - dt * 1.2);
  }

  // ── Banner fade ────────────────────────────────────────────────────────────
  if (bannerTimer > 0) {
    bannerTimer -= dt;
    if (bannerTimer <= 0) banner.style.opacity = "0";
  }

  // ── Camera ─────────────────────────────────────────────────────────────────
  const targetCamX = player.x - VW / 2;
  const targetCamY = player.y - VH / 2;
  const lf = Math.min(1, CFG.camLerp * dt);
  cam.x += (targetCamX - cam.x) * lf;
  cam.y += (targetCamY - cam.y) * lf;
  cam.x = clamp(cam.x, 0, CFG.mapW - VW);
  cam.y = clamp(cam.y, 0, CFG.mapH - VH);

  // ── Render ─────────────────────────────────────────────────────────────────
  ctx.save();
  ctx.scale(dpr, dpr);
  drawMap();
  drawObjects();
  drawParticles();
  drawHoles();
  ctx.restore();

  updateHUD();
}

// ══════════════════════════════════════════════════════════════════════════════
// ── GAME END ──────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function endGame() {
  gameOver = true;
  respawnNotice.style.display = "none";

  const sorted = holes.slice().sort((a, b) => b.r - a.r);
  const rank = sorted.findIndex(h => h.isPlayer) + 1;
  const suffix = rank === 1 ? "st" : rank === 2 ? "nd" : rank === 3 ? "rd" : "th";

  const best = parseInt(tryLoad("chasm-best") || "0", 10);
  if (player.score > best) tryStore("chasm-best", player.score);
  const newBest = parseInt(tryLoad("chasm-best") || "0", 10);

  let tname = CFG.tierNames[getTier(player.r)] || "Pebble";
  document.getElementById("ov-stats").textContent =
    `You came ${rank}${suffix} · Score: ${player.score} · Best: ${newBest} · Tier: ${tname}`;

  document.getElementById("overlay").className = "overlay show";
}

// ══════════════════════════════════════════════════════════════════════════════
// ── INIT / RESET ──────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function newGame() {
  document.getElementById("overlay").className = "overlay";
  respawnNotice.style.display = "none";
  banner.style.opacity = "0";
  bannerTimer = 0; lastTier = 0;

  // Reset particle pool
  for (let i = 0; i < POOL_SIZE; i++) particles[i].active = false;

  // Build world objects and spatial grid
  objs = placeObjects();
  grid = new SpatialGrid(CFG.mapW, CFG.mapH, 120);
  for (let i = 0; i < objs.length; i++) grid.insert(objs[i]);

  // Place holes (player + AI)
  const cx = CFG.mapW / 2, cy = CFG.mapH / 2;
  player = makeHole(cx, cy, CFG.playerStartR, true, "You", "#2fe7f7");
  holes  = [player];

  const spread = 600;
  for (let i = 0; i < CFG.aiCount; i++) {
    const angle = (i / CFG.aiCount) * Math.PI * 2 + Math.PI / 4;
    const dist  = 350 + Math.random() * spread;
    const ax = clamp(cx + Math.cos(angle) * dist, 100, CFG.mapW - 100);
    const ay = clamp(cy + Math.sin(angle) * dist, 100, CFG.mapH - 100);
    const ar = CFG.playerStartR * (0.8 + Math.random() * 0.5);
    holes.push(makeHole(ax, ay, ar, false, CFG.aiNames[i], CFG.aiColors[i]));
  }

  cam = {
    x: clamp(cx - VW / 2, 0, CFG.mapW - VW),
    y: clamp(cy - VH / 2, 0, CFG.mapH - VH),
  };
  timeLeft = CFG.roundTime;
  gameOver = false;
  lastTs   = 0;
}

// ── Start ──────────────────────────────────────────────────────────────────────
bestScore = parseInt(tryLoad("chasm-best") || "0", 10);
document.getElementById("btn-replay").addEventListener("click", newGame);

newGame();
if (rafId) cancelAnimationFrame(rafId);
rafId = requestAnimationFrame(loop);

// ── PWA ────────────────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("../../sw.js"));
</script>
</body>
</html>
