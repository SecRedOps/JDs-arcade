    border-radius: 999px; padding: 5px 12px;

    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);

<script>
"use strict";

// ══════════════════════════════════════════════════════════════════════════════
// ── CONFIG  (tune everything here) ───────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const CFG = {
  mapW: 2400, mapH: 2400,    // CURRENT world size (grows during play — see expandMap)
  baseMapW: 2400, baseMapH: 2400, // starting world size, restored on new game
  expandTrigger: 10,         // expand when the biggest hole's r exceeds mapW / this
  expandTarget: 14,          // grow the map so its side ≈ biggest r * this
  blockPitch: 240,           // road grid pitch (block + road)
  roadW: 28,                 // road stripe width
  roundTime: 120,            // seconds per round
  playerSpeed: 190,          // px / s
  aiSpeed: 155,
  aiCount: 4,
  playerStartR: 28,          // starting hole radius
  growthFactor: 0.75,        // AREA transfer: r' = √(r² + f·objR²) — diminishing returns, no runaway
  holeMergeRatio: 1.15,      // bigger hole must be this ratio larger to swallow smaller
  respawnTime: 3,            // seconds player is penalised after being swallowed
  respawnRFraction: 0.65,    // player keeps this fraction of radius on respawn
  objRespawnMin: 9,          // eaten objects reappear elsewhere after this many seconds…
  objRespawnMax: 15,         // …up to this many
  camLerp: 9,                // camera spring constant (units/s)
  maxDt: 1 / 20,             // cap dt to prevent spiral-of-death

  // ── Tier thresholds (hole.r must EXCEED this to enter tier) ────────────────
  // tier 0 = start, tier 1 = small stuff, …
  tierR: [0, 14, 32, 62, 105, 999],
  tierNames: ["Pebble", "Pothole", "Sinkhole", "Chasm", "Abyss"],
  tierColors: ["#8a93a8", "#35e63c", "#f8ec22", "#ff8c35", "#ff35b5"],

  // ── Object types ───────────────────────────────────────────────────────────
  // r = footprint radius; shape: tri | circ | rect | tree | bldg | tall
  objs: [
    { label:"Cone",   r:12, tier:0, pts:10,  color:"#f39c12", shape:"tri",  count:52 },
    { label:"Bush",   r:16, tier:0, pts:15,  color:"#27ae60", shape:"circ", count:42 },
    { label:"Person", r:13, tier:0, pts:12,  color:"#e8a87a", shape:"pers", count:36 },
    { label:"Bench",  r:22, tier:1, pts:40,  color:"#8d6e63", shape:"rect", count:26 },
    { label:"Car",    r:28, tier:1, pts:60,  color:"#c0392b", shape:"car",  count:24 },
    { label:"Tree",   r:24, tier:1, pts:45,  color:"#2ecc71", shape:"tree", count:22 },
    { label:"Kiosk",  r:46, tier:2, pts:130, color:"#e6b800", shape:"bldg", count:16 },
    { label:"Shop",   r:58, tier:2, pts:210, color:"#3498db", shape:"bldg", count:12 },
    { label:"Block",  r:90, tier:3, pts:380, color:"#9b59b6", shape:"tall", count:10 },
    { label:"Tower",  r:120,tier:3, pts:650, color:"#e74c3c", shape:"tall", count:7  },
  ],
  maxObjR: 120,              // largest obj radius (for grid query padding)

  aiColors: ["#ff6b9d","#ffd93d","#6bcb77","#ff922b","#a9e4f7"],
  aiNames:  ["Rift α","Rift β","Rift γ","Rift δ","Rift ε"],

  // ── Camera zoom ────────────────────────────────────────────────────────────
  zoomRef: 28,             // player.r at which zoom = 1.0 (equals playerStartR)
  minZoom: 0.12,           // most zoomed-out the camera goes (deeper now the map expands)
  maxHoleScreenFrac: 0.30, // hole may never exceed this fraction of the smaller viewport side
};

// ══════════════════════════════════════════════════════════════════════════════
// ── UTILS ─────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const mod = (a, n) => ((a % n) + n) % n; // true modulo (handles negatives)
function tryStore(k, v) { try { localStorage.setItem(k, String(v)); } catch(_) {} }
function tryLoad(k) { try { return localStorage.getItem(k); } catch(_) { return null; } }

const PERSON_SPEED      = 38;   // px/s normal walk
const PERSON_FLEE_SPEED = 95;   // px/s when a large hole is nearby

// ══════════════════════════════════════════════════════════════════════════════
// ── SPATIAL GRID ──────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
class SpatialGrid {
  constructor(w, h, cell) {
    this.cell = cell;
    this.cols = Math.ceil(w / cell);
    this.rows = Math.ceil(h / cell);
    this._g = Array.from({ length: this.cols * this.rows }, () => []);
    this._buf = []; // reused query result — no per-frame alloc
  }
  _idx(x, y) { return (y / this.cell | 0) * this.cols + (x / this.cell | 0); }
  insert(obj) {
    const idx = this._idx(obj.x, obj.y);
    if (idx >= 0 && idx < this._g.length) this._g[idx].push(obj);
  }
  remove(obj) {
    const idx = this._idx(obj.x, obj.y);
    if (idx < 0 || idx >= this._g.length) return;
    const cell = this._g[idx];
    const i = cell.indexOf(obj);
    if (i >= 0) { cell[i] = cell[cell.length - 1]; cell.pop(); }
  }
  query(x, y, r) {
    const buf = this._buf; buf.length = 0;
    const c0 = clamp((x - r) / this.cell | 0, 0, this.cols - 1);
    const c1 = clamp((x + r) / this.cell | 0, 0, this.cols - 1);
    const r0 = clamp((y - r) / this.cell | 0, 0, this.rows - 1);
    const r1 = clamp((y + r) / this.cell | 0, 0, this.rows - 1);
    for (let ry = r0; ry <= r1; ry++)
      for (let cx = c0; cx <= c1; cx++) {
        const cell = this._g[ry * this.cols + cx];
        for (let i = 0; i < cell.length; i++) buf.push(cell[i]);
      }
    return buf;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ── CANVAS & DPR SETUP ────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const dpr = Math.min(window.devicePixelRatio || 1, 2);
let VW = 0, VH = 0; // viewport in CSS px

let vignette = null; // cached screen-space gradient, rebuilt on resize
function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.style.width  = VW + "px";
  canvas.style.height = VH + "px";
  canvas.width  = VW * dpr;
  canvas.height = VH * dpr;
  vignette = ctx.createRadialGradient(VW/2, VH/2, Math.min(VW, VH) * 0.45,
                                      VW/2, VH/2, Math.max(VW, VH) * 0.72);
  vignette.addColorStop(0, "rgba(0,0,0,0)");
  vignette.addColorStop(1, "rgba(0,0,0,0.26)");
}
resize();
window.addEventListener("resize", resize);

// ══════════════════════════════════════════════════════════════════════════════
// ── CITY PALETTE & COLOUR HELPERS ─────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const ROAD_COLOR  = "#44484f";                                        // asphalt
const SIDEWALK    = "#9aa0a8";                                        // concrete kerb
const SIDEWALK_W  = 12;
const LOT_PAL     = ["#b9b3a6","#c4beb0","#aea89b","#c9c2b2","#b4ad9f"]; // paved lots
const PARK_PAL    = ["#6da961","#75b068","#659e5a"];                     // park grass
const CAR_PAL     = ["#b03a30","#2c3e50","#c8cdd3","#2e6da4","#d99a2b","#3d7a46","#e8e8e6","#7a4b8f"];
const WARDROBE    = ["#c74a3f","#3b7bbf","#8e5bb5","#2f9e83","#d97b29","#6b7280","#b03a6e"];
const SKIN_PAL    = ["#e8b48c","#c98d63","#8d5a3b","#f0c9a0"];

// Cached tint/shade of a hex colour (f < 1 darker, f > 1 lighter)
const _shadeCache = new Map();
function shade(hex, f) {
  const key = hex + "|" + f;
  let v = _shadeCache.get(key);
  if (v) return v;
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(((n >> 16) & 255) * f, 0, 255) | 0;
  const g = clamp(((n >>  8) & 255) * f, 0, 255) | 0;
  const b = clamp(( n        & 255) * f, 0, 255) | 0;
  v = `rgb(${r},${g},${b})`;
  _shadeCache.set(key, v);
  return v;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── WORLD STATE ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
let grid;         // SpatialGrid
let objs;         // world object array
let holes;        // player hole + AI holes
let player;       // ref to player's hole
let cam;          // {x,y} — CENTER of viewport in world coords
let zoom = 1;     // camera zoom: 1 = normal, <1 = zoomed out
let timeLeft;
let gameOver;
let bestScore;

// Particle pool (eat-flash effect)
const POOL_SIZE = 60;
const particles = Array.from({ length: POOL_SIZE }, () =>
  ({ active: false, x: 0, y: 0, r: 0, maxR: 0, t: 0, dur: 0, color: "#fff" })
);
function spawnParticle(x, y, maxR, color) {
  for (let i = 0; i < POOL_SIZE; i++) {
    if (!particles[i].active) {
      const p = particles[i];
      p.active = true; p.x = x; p.y = y; p.r = 0;
      p.maxR = maxR; p.t = 0; p.dur = 0.35; p.color = color;
      return;
    }
  }
}

// Floating "+points" popups (player eats only)
const POPUP_SIZE = 14;
const popups = Array.from({ length: POPUP_SIZE }, () =>
  ({ active: false, x: 0, y: 0, t: 0, dur: 0.9, text: "" })
);
function spawnPopup(x, y, text) {
  for (let i = 0; i < POPUP_SIZE; i++) {
    if (!popups[i].active) {
      const p = popups[i];
      p.active = true; p.x = x; p.y = y; p.t = 0; p.text = text;
      return;
    }
  }
}

// ── Hole factory ──────────────────────────────────────────────────────────────
function makeHole(x, y, r, isPlayer, name, color) {
  return {
    x, y, r,
    isPlayer, name, color,
    score: 0,
    vx: 0, vy: 0,
    tier: 0,
    respawning: false, respawnTimer: 0,
    wanderAngle: Math.random() * Math.PI * 2,
    wanderTimer: 0,
    eatAnim: 0,   // wobble on eating
  };
}

// ── Object factory ────────────────────────────────────────────────────────────
function makeObj(type, x, y) {
  const obj = {
    x, y, r: type.r, tier: type.tier, pts: type.pts,
    color: type.color, shape: type.shape, label: type.label,
    eaten: false,
    swallowing: false, swallowT: 0, swallowDur: 0.4,
    swallowHole: null,
    sx: x, sy: y,
    origR: type.r,
    seed: Math.random(),  // per-object visual variety (colour, canopy, roof clutter)
    mobile: type.shape === "pers",
    respawnT: 0,   // countdown until an eaten object reappears elsewhere
    spawnAnim: 1,  // 0→1 pop-in scale after relocation
  };
  if (type.shape === "car") // parked along a road axis, slightly askew
    obj.rot = (Math.random() < 0.5 ? 0 : Math.PI / 2) + (Math.random() - 0.5) * 0.06;
  if (obj.mobile) {
    const ang = Math.random() * Math.PI * 2;
    obj.vx = Math.cos(ang) * PERSON_SPEED;
    obj.vy = Math.sin(ang) * PERSON_SPEED;
    obj.wanderTimer = Math.random() * 4;
    obj.walkPhase  = Math.random() * Math.PI * 2;
  }
  return obj;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── OBJECT PLACEMENT ──────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function placeObjects() {
  const list = [];
  const half = CFG.roadW / 2;
  const inner = CFG.blockPitch - CFG.roadW;

  for (const type of CFG.objs) {
    let placed = 0, tries = 0;
    while (placed < type.count && tries < type.count * 30) {
      tries++;
      const wx = Math.random() * CFG.mapW;
      const wy = Math.random() * CFG.mapH;

      // Reject if on road
      const bx = wx % CFG.blockPitch, by = wy % CFG.blockPitch;
      if (bx < half + type.r + 4 || bx > CFG.blockPitch - half - type.r - 4) continue;
      if (by < half + type.r + 4 || by > CFG.blockPitch - half - type.r - 4) continue;

      // Reject if overlapping existing objects (generation-time O(n), not per-frame)
      let ok = true;
      for (let i = list.length - 1; i >= Math.max(0, list.length - 80); i--) {
        const o = list[i];
        const dx = o.x - wx, dy = o.y - wy;
        if (dx*dx + dy*dy < (o.r + type.r + 6) * (o.r + type.r + 6)) { ok = false; break; }
      }
      if (!ok) continue;

      list.push(makeObj(type, wx, wy));
      placed++;
    }
  }
  return list;
}

// Find a valid position for an object of radius r: off-road, clear of holes
// and existing objects. Returns {x, y} or null after 30 tries.
function findSpot(r) {
  const half = CFG.roadW / 2;
  for (let tries = 0; tries < 30; tries++) {
    const wx = Math.random() * CFG.mapW;
    const wy = Math.random() * CFG.mapH;

    // Off-road only
    const bx = wx % CFG.blockPitch, by = wy % CFG.blockPitch;
    if (bx < half + r + 4 || bx > CFG.blockPitch - half - r - 4) continue;
    if (by < half + r + 4 || by > CFG.blockPitch - half - r - 4) continue;

    // Keep clear of every hole so it doesn't pop in on top of anyone
    let bad = false;
    for (let i = 0; i < holes.length; i++) {
      const h = holes[i];
      const dx = h.x - wx, dy = h.y - wy;
      const cl = h.r + r + 120;
      if (dx*dx + dy*dy < cl*cl) { bad = true; break; }
    }
    if (bad) continue;

    // Keep clear of existing objects
    const near = grid.query(wx, wy, r + CFG.maxObjR);
    for (let i = 0; i < near.length; i++) {
      const n = near[i];
      const dx = n.x - wx, dy = n.y - wy, min = n.r + r + 6;
      if (dx*dx + dy*dy < min*min) { bad = true; break; }
    }
    if (bad) continue;

    return { x: wx, y: wy };
  }
  return null;
}

// Reappear an eaten object at a fresh valid spot (keeps the map populated all round)
function relocateObj(o) {
  const spot = findSpot(o.r);
  if (!spot) return false;
  o.x = spot.x; o.y = spot.y; o.sx = spot.x; o.sy = spot.y;
  o.eaten = false; o.swallowHole = null;
  o.spawnAnim = 0;
  grid.insert(o);
  return true;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── MAP EXPANSION ─────────────────────────────────────────────────────────────
// The city grows as the holes do. Without this, the biggest hole eventually gets
// pinned by the map-edge clamp (its movement range shrinks toward zero) and the
// leader simply parks and auto-wins.
// ══════════════════════════════════════════════════════════════════════════════
let blockShift = 0; // block-index offset so block colours stay stable across expansions

function expandMap() {
  let maxR = 0;
  for (let i = 0; i < holes.length; i++) if (holes[i].r > maxR) maxR = holes[i].r;
  if (maxR <= CFG.mapW / CFG.expandTrigger) return;

  // Grow symmetrically, quantized to whole blocks per side so roads stay aligned
  const p = CFG.blockPitch;
  const perSide = Math.ceil((maxR * CFG.expandTarget - CFG.mapW) / 2 / p) * p;
  if (perSide <= 0) return;

  const oldArea = CFG.mapW * CFG.mapH;
  CFG.mapW += perSide * 2;
  CFG.mapH += perSide * 2;
  blockShift += perSide / p;

  // Shift the whole world by one side's growth so the expansion is centered
  for (let i = 0; i < objs.length; i++) {
    const o = objs[i];
    o.x += perSide; o.y += perSide; o.sx += perSide; o.sy += perSide;
  }
  for (let i = 0; i < holes.length; i++) { holes[i].x += perSide; holes[i].y += perSide; }
  for (let i = 0; i < POOL_SIZE; i++)  { particles[i].x += perSide; particles[i].y += perSide; }
  for (let i = 0; i < POPUP_SIZE; i++) { popups[i].x += perSide; popups[i].y += perSide; }
  cam.x += perSide; cam.y += perSide;

  // Rebuild the spatial grid at the new size
  grid = new SpatialGrid(CFG.mapW, CFG.mapH, 120);
  for (let i = 0; i < objs.length; i++)
    if (!objs[i].eaten) grid.insert(objs[i]);

  // Populate the new land so object density stays roughly constant
  const addedArea = CFG.mapW * CFG.mapH - oldArea;
  const baseArea = CFG.baseMapW * CFG.baseMapH;
  for (const type of CFG.objs) {
    const extra = Math.round(type.count * addedArea / baseArea);
    for (let k = 0; k < extra; k++) {
      const spot = findSpot(type.r);
      if (!spot) continue;
      const o = makeObj(type, spot.x, spot.y);
      o.spawnAnim = 0;
      objs.push(o);
      grid.insert(o);
    }
  }

  banner.textContent = "🌆 The city grows!";
  banner.style.opacity = "1";
  bannerTimer = 2.2;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── INPUT ─────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const keys = {};
const touch = { active: false, x: 0, y: 0 };
const mouse = { known: false, x: 0, y: 0 };

document.addEventListener("keydown", e => { keys[e.code] = true; });
document.addEventListener("keyup",   e => { keys[e.code] = false; });

canvas.addEventListener("mousemove", e => {
  mouse.known = true;
  mouse.x = e.clientX; mouse.y = e.clientY;
});
canvas.addEventListener("mouseleave", () => { mouse.known = false; });

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  touch.active = true;
  touch.x = e.touches[0].clientX;
  touch.y = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  touch.x = e.touches[0].clientX;
  touch.y = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener("touchend", e => {
  e.preventDefault();
  touch.active = false;
}, { passive: false });

// Convert a screen (CSS px) position to world coordinates under the center-pivot camera
function screenToWorld(px, py) {
  return { x: (px - VW / 2) / zoom + cam.x, y: (py - VH / 2) / zoom + cam.y };
}

// Steer toward a world point with an analog ramp; deadzone & ramp are screen-relative
function steerToward(wx, wy) {
  const dx = wx - player.x, dy = wy - player.y;
  const d  = Math.sqrt(dx*dx + dy*dy);
  const dead = Math.max(8 / zoom, player.r * 0.15);
  if (d <= dead) return null;
  const speed = Math.min(1, (d - dead) / (60 / zoom)); // ramp over 60 screen px
  return { x: (dx/d) * speed, y: (dy/d) * speed };
}

function getPlayerInput() {
  // 1) Touch drag (mobile)
  if (touch.active) {
    const w = screenToWorld(touch.x, touch.y);
    return steerToward(w.x, w.y);
  }
  // 2) Keyboard
  let kx = 0, ky = 0;
  if (keys["ArrowLeft"]  || keys["KeyA"]) kx -= 1;
  if (keys["ArrowRight"] || keys["KeyD"]) kx += 1;
  if (keys["ArrowUp"]    || keys["KeyW"]) ky -= 1;
  if (keys["ArrowDown"]  || keys["KeyS"]) ky += 1;
  if (kx || ky) {
    const d = Math.sqrt(kx*kx + ky*ky);
    return { x: kx/d, y: ky/d };
  }
  // 3) Mouse: hole chases the cursor (desktop, .io style)
  if (mouse.known) {
    const w = screenToWorld(mouse.x, mouse.y);
    return steerToward(w.x, w.y);
  }
  return null;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── PHYSICS ───────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function moveHole(hole, dx, dy, dt) {
  const spd = (hole.isPlayer ? CFG.playerSpeed : CFG.aiSpeed) * (1 + hole.r * 0.0004);
  let nx = hole.x + dx * spd * dt;
  let ny = hole.y + dy * spd * dt;

  // Map boundary
  nx = clamp(nx, hole.r, CFG.mapW - hole.r);
  ny = clamp(ny, hole.r, CFG.mapH - hole.r);

  // Slide around objects larger than this hole (can't eat → solid)
  const check = grid.query(nx, ny, hole.r + CFG.maxObjR);
  for (let i = 0; i < check.length; i++) {
    const o = check[i];
    if (o.eaten || o.swallowing) continue;
    if (o.r < hole.r) continue; // edible, not solid
    const odx = nx - o.x, ody = ny - o.y;
    const d2 = odx*odx + ody*ody;
    const minD = hole.r + o.r;
    if (d2 < minD * minD && d2 > 0.0001) {
      const d = Math.sqrt(d2);
      nx = o.x + odx/d * minD;
      ny = o.y + ody/d * minD;
    }
  }

  hole.x = clamp(nx, hole.r, CFG.mapW - hole.r);
  hole.y = clamp(ny, hole.r, CFG.mapH - hole.r);
}

function eatObject(hole, obj) {
  obj.eaten = true;
  obj.swallowing = true;
  obj.swallowT = 0;
  obj.swallowDur = 0.35 + Math.random() * 0.1;
  obj.swallowHole = hole;
  obj.sx = obj.x; obj.sy = obj.y;
  grid.remove(obj);
  spawnParticle(obj.x, obj.y, obj.r * 1.8, obj.color);
  hole.eatAnim = 0.18; // wobble amount
}

function checkEating(hole) {
  if (hole.respawning) return;
  const check = grid.query(hole.x, hole.y, hole.r + CFG.maxObjR);
  for (let i = 0; i < check.length; i++) {
    const o = check[i];
    if (o.eaten || o.swallowing) continue;
    if (o.r >= hole.r) continue;
    const dx = o.x - hole.x, dy = o.y - hole.y;
    if (dx*dx + dy*dy < hole.r * hole.r) eatObject(hole, o);
  }
}

function checkHoleCollisions() {
  for (let i = 0; i < holes.length; i++) {
    const a = holes[i];
    if (a.respawning) continue;
    for (let j = i + 1; j < holes.length; j++) {
      const b = holes[j];
      if (b.respawning) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx*dx + dy*dy;
      const big = a.r >= b.r ? a : b;
      const small = a.r >= b.r ? b : a;
      if (big.r < small.r * CFG.holeMergeRatio) continue; // too close in size
      if (d2 < big.r * big.r * 0.7) {
        big.r = Math.sqrt(big.r * big.r + 0.5 * small.r * small.r); // area-based, no runaway
        big.score += Math.floor(small.score * 0.15);
        spawnParticle(small.x, small.y, small.r * 2, small.color);
        if (small.isPlayer) {
          respawnPlayer(small);
        } else {
          small.respawning = true;
          small.respawnTimer = 6 + Math.random() * 4;
          small.r = CFG.playerStartR * (0.7 + Math.random() * 0.4);
          small.score = 0;
        }
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ── PEDESTRIANS ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function updatePedestrians(dt) {
  for (let i = 0; i < objs.length; i++) {
    const o = objs[i];
    if (!o.mobile || o.eaten) continue;

    // Flee from any hole big enough to eat this person
    let fleeX = 0, fleeY = 0;
    for (let j = 0; j < holes.length; j++) {
      const h = holes[j];
      if (h.respawning || h.r <= o.r * 1.1) continue;
      const dx = o.x - h.x, dy = o.y - h.y;
      const d2 = dx*dx + dy*dy;
      const fleeR = h.r * 3.5;
      if (d2 < fleeR * fleeR) {
        const d = Math.sqrt(d2) || 1;
        const strength = 1 - Math.sqrt(d2) / fleeR;
        fleeX += (dx / d) * strength;
        fleeY += (dy / d) * strength;
      }
    }

    if (fleeX !== 0 || fleeY !== 0) {
      const fl = Math.sqrt(fleeX*fleeX + fleeY*fleeY) || 1;
      o.vx = (fleeX / fl) * PERSON_FLEE_SPEED;
      o.vy = (fleeY / fl) * PERSON_FLEE_SPEED;
    } else {
      o.wanderTimer -= dt;
      if (o.wanderTimer <= 0) {
        const ang = Math.random() * Math.PI * 2;
        o.vx = Math.cos(ang) * PERSON_SPEED;
        o.vy = Math.sin(ang) * PERSON_SPEED;
        o.wanderTimer = 2 + Math.random() * 4;
      }
    }

    // Move and bounce off map edges
    grid.remove(o);
    let nx = o.x + o.vx * dt;
    let ny = o.y + o.vy * dt;
    if (nx < o.r)            { nx = o.r;             o.vx =  Math.abs(o.vx); }
    if (nx > CFG.mapW - o.r) { nx = CFG.mapW - o.r;  o.vx = -Math.abs(o.vx); }
    if (ny < o.r)            { ny = o.r;             o.vy =  Math.abs(o.vy); }
    if (ny > CFG.mapH - o.r) { ny = CFG.mapH - o.r;  o.vy = -Math.abs(o.vy); }
    o.x = nx; o.y = ny;
    o.walkPhase += dt * 6;
    grid.insert(o);
  }
}

function getTier(r) {
  for (let i = CFG.tierR.length - 2; i >= 0; i--)
    if (r > CFG.tierR[i]) return i;
  return 0;
}
function getTierProgress(r) {
  const t = getTier(r);
  const lo = CFG.tierR[t], hi = CFG.tierR[t + 1] || lo + 1;
  return (r - lo) / (hi - lo);
}

// ══════════════════════════════════════════════════════════════════════════════
// ── AI ────────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function updateAI(hole, dt) {
  if (hole.respawning) {
    hole.respawnTimer -= dt;
    if (hole.respawnTimer <= 0) {
      hole.respawning = false;
      hole.x = CFG.roadW/2 + Math.random() * (CFG.mapW - CFG.roadW);
      hole.y = CFG.roadW/2 + Math.random() * (CFG.mapH - CFG.roadW);
    }
    return;
  }

  // Update wander
  hole.wanderTimer -= dt;
  if (hole.wanderTimer <= 0) {
    hole.wanderAngle += (Math.random() - 0.5) * 1.8;
    hole.wanderTimer = 1.5 + Math.random() * 2;
  }

  // Find nearest edible object
  let target = null, bestD2 = Infinity;
  const search = grid.query(hole.x, hole.y, hole.r + 400);
  for (let i = 0; i < search.length; i++) {
    const o = search[i];
    if (o.eaten || o.swallowing || o.r >= hole.r) continue;
    const dx = o.x - hole.x, dy = o.y - hole.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bestD2) { bestD2 = d2; target = o; }
  }

  // Check for a smaller hole to hunt (nearest within range)
  let hunt = null, huntD2 = Infinity;
  for (let i = 0; i < holes.length; i++) {
    const h = holes[i];
    if (h === hole || h.respawning) continue;
    if (h.r * CFG.holeMergeRatio > hole.r) continue;
    const dx = h.x - hole.x, dy = h.y - hole.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < 350 * 350 && d2 < huntD2) { hunt = h; huntD2 = d2; }
  }

  let mx, my;
  if (hunt) {
    const dx = hunt.x - hole.x, dy = hunt.y - hole.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    mx = dx/d; my = dy/d;
  } else if (target) {
    const dx = target.x - hole.x, dy = target.y - hole.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    // Add small noise so AI doesn't move in perfectly straight lines
    const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.25;
    mx = Math.cos(ang); my = Math.sin(ang);
  } else {
    mx = Math.cos(hole.wanderAngle);
    my = Math.sin(hole.wanderAngle);
  }

  // Flee from bigger holes nearby
  for (let i = 0; i < holes.length; i++) {
    const h = holes[i];
    if (h === hole || h.respawning || h.r < hole.r * CFG.holeMergeRatio) continue;
    const dx = hole.x - h.x, dy = hole.y - h.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    if (d < h.r * 2.5) { mx += (dx/d) * 2; my += (dy/d) * 2; }
  }

  const len = Math.sqrt(mx*mx + my*my) || 1;
  moveHole(hole, mx/len, my/len, dt);
}

// ══════════════════════════════════════════════════════════════════════════════
// ── RENDERING ─────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function drawMap() {
  // All coords are in world space — the ctx transform (center-pivot + zoom) handles screen mapping.
  ctx.fillStyle = ROAD_COLOR;
  ctx.fillRect(0, 0, CFG.mapW, CFG.mapH);  // fill entire map; GPU clips to canvas

  const p = CFG.blockPitch, half = CFG.roadW / 2, inner = p - CFG.roadW;
  const hw = VW / (2 * zoom), hh = VH / (2 * zoom);  // half-viewport in world units
  const bxMin = Math.max(0, Math.floor((cam.x - hw - half) / p));
  const bxMax = Math.min(Math.ceil(CFG.mapW / p), Math.ceil((cam.x + hw + half) / p));
  const byMin = Math.max(0, Math.floor((cam.y - hh - half) / p));
  const byMax = Math.min(Math.ceil(CFG.mapH / p), Math.ceil((cam.y + hh + half) / p));
  const detail = zoom > 0.2;  // LOD: skip kerbs / park detail when zoomed far out

  for (let bx = bxMin; bx <= bxMax; bx++) {
    for (let by = byMin; by <= byMax; by++) {
      // Hash on pre-expansion block indices so colours don't jump when the map grows
      const ux = bx - blockShift, uy = by - blockShift;
      const h1 = mod(ux * 7 + uy * 13, 100);
      const isPark = h1 % 10 < 3;
      const x0 = bx * p + half, y0 = by * p + half;
      const ground = isPark
        ? PARK_PAL[mod(ux * 3 + uy * 5, PARK_PAL.length)]
        : LOT_PAL[mod(ux * 5 + uy * 3, LOT_PAL.length)];

      if (detail) {
        ctx.fillStyle = SIDEWALK;                     // concrete kerb ring
        ctx.fillRect(x0, y0, inner, inner);
        ctx.fillStyle = ground;
        ctx.fillRect(x0 + SIDEWALK_W, y0 + SIDEWALK_W,
                     inner - SIDEWALK_W * 2, inner - SIDEWALK_W * 2);
      } else {
        ctx.fillStyle = ground;
        ctx.fillRect(x0, y0, inner, inner);
      }

      if (isPark && detail) {
        // Mowing patches + the occasional pond, deterministic per block
        const gx = x0 + SIDEWALK_W, gy = y0 + SIDEWALK_W, gw = inner - SIDEWALK_W * 2;
        ctx.fillStyle = "rgba(20,60,20,0.14)";
        ctx.beginPath(); ctx.ellipse(gx + gw * (0.22 + (h1 % 7) * 0.05), gy + gw * 0.3,  gw * 0.17, gw * 0.11,  0.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(gx + gw * 0.7,  gy + gw * (0.58 + (h1 % 5) * 0.05), gw * 0.13, gw * 0.10, -0.4, 0, Math.PI * 2); ctx.fill();
        if (h1 % 4 === 0) {
          ctx.fillStyle = "#5f9ec9";
          ctx.beginPath(); ctx.ellipse(gx + gw * 0.48, gy + gw * 0.5, gw * 0.19, gw * 0.13, 0.4, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
  }

  // Faded-yellow centre lines (skipped when zoomed way out — sub-pixel anyway)
  if (zoom > 0.22) {
    ctx.save();
    ctx.strokeStyle = "rgba(212,177,63,0.5)";
    ctx.setLineDash([14, 18]);
    ctx.lineWidth = 2;
    for (let bx = 0; bx * p <= CFG.mapW; bx++) {
      const sx = bx * p;
      if (sx < cam.x - hw - 20 || sx > cam.x + hw + 20) continue;
      ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, CFG.mapH); ctx.stroke();
    }
    for (let by = 0; by * p <= CFG.mapH; by++) {
      const sy = by * p;
      if (sy < cam.y - hh - 20 || sy > cam.y + hh + 20) continue;
      ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(CFG.mapW, sy); ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Zebra crossings on all four arms of each visible intersection
  if (zoom > 0.35) {
    ctx.fillStyle = "rgba(240,240,235,0.7)";
    for (let ix = bxMin; ix <= bxMax + 1; ix++) {
      const cxp = ix * p;
      if (cxp < cam.x - hw - p || cxp > cam.x + hw + p) continue;
      for (let iy = byMin; iy <= byMax + 1; iy++) {
        const cyp = iy * p;
        if (cyp < cam.y - hh - p || cyp > cam.y + hh + p) continue;
        for (let s = 0; s < 4; s++) {
          const off = -half + 3 + s * 7;
          ctx.fillRect(cxp + off, cyp - half - 12, 4.5, 10); // north arm
          ctx.fillRect(cxp + off, cyp + half + 2,  4.5, 10); // south
          ctx.fillRect(cxp - half - 12, cyp + off, 10, 4.5); // west
          ctx.fillRect(cxp + half + 2,  cyp + off, 10, 4.5); // east
        }
      }
    }
  }
}

function drawObj(o, sx, sy, scale, alpha) {
  if (scale <= 0.02) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(sx, sy);
  ctx.scale(scale, scale);

  // Light comes from the upper-left everywhere: shadows fall down-right,
  // building roofs are offset up-left with the walls visible below-right.
  const r = o.origR, c = o.color, seed = o.seed || 0;
  switch (o.shape) {
    case "tri": { // traffic cone
      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath(); ctx.ellipse(r*0.14, r*0.5, r*0.72, r*0.28, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = shade(c, 0.78);                       // base plate
      ctx.fillRect(-r*0.8, r*0.36, r*1.6, r*0.28);
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r*0.62, r*0.45); ctx.lineTo(-r*0.62, r*0.45); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#f4f4f0";                            // reflective band
      ctx.fillRect(-r*0.4, -r*0.18, r*0.8, r*0.2);
      break;
    }
    case "circ": { // bush — clustered lobes with a lit crown
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(r*0.14, r*0.18, r, r*0.88, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = shade(c, 0.72);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = c;
      const ba = seed * Math.PI * 2;
      for (let k = 0; k < 3; k++) {
        const a = ba + k * 2.1;
        ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.34, Math.sin(a)*r*0.34, r*0.52, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = shade(c, 1.3);
      ctx.beginPath(); ctx.arc(-r*0.26, -r*0.3, r*0.34, 0, Math.PI*2); ctx.fill();
      break;
    }
    case "pers": { // top-down person, rotates to face movement
      if (o.mobile && (o.vx || o.vy)) ctx.rotate(Math.atan2(o.vy, o.vx) - Math.PI / 2);
      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath(); ctx.ellipse(r*0.1, r*0.14, r*0.6, r*0.5, 0, 0, Math.PI*2); ctx.fill();
      const walking = o.mobile && o.walkPhase !== undefined;
      if (walking) { // animated legs
        const leg = Math.sin(o.walkPhase) * r * 0.24;
        ctx.fillStyle = "#2e2a26";
        ctx.beginPath(); ctx.ellipse(-r*0.18, r*0.5 + leg, r*0.15, r*0.24, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( r*0.18, r*0.5 - leg, r*0.15, r*0.24, 0, 0, Math.PI*2); ctx.fill();
      }
      const shirt = WARDROBE[(seed * WARDROBE.length) | 0];
      ctx.fillStyle = shirt;                                // torso / shoulders
      ctx.beginPath(); ctx.ellipse(0, r*0.06, r*0.52, r*0.66, 0, 0, Math.PI*2); ctx.fill();
      if (walking) { // arms swing opposite the legs
        const arm = Math.sin(o.walkPhase + Math.PI) * r * 0.2;
        ctx.fillStyle = shade(shirt, 0.85);
        ctx.beginPath(); ctx.ellipse(-r*0.5, r*0.05 + arm, r*0.13, r*0.2, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( r*0.5, r*0.05 - arm, r*0.13, r*0.2, 0, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = SKIN_PAL[((seed * 13) | 0) % SKIN_PAL.length];
      ctx.beginPath(); ctx.arc(0, -r*0.44, r*0.34, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = seed > 0.85 ? "#d8c46a" : seed > 0.6 ? "#5a4632" : "#2a2320"; // hair
      ctx.beginPath(); ctx.arc(0, -r*0.52, r*0.26, 0, Math.PI*2); ctx.fill();
      break;
    }
    case "rect": { // park bench: frame + wooden slats
      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath(); ctx.ellipse(r*0.1, r*0.16, r*1.05, r*0.6, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = shade(c, 0.6);
      ctx.fillRect(-r, -r*0.55, r*2, r*1.1);
      ctx.fillStyle = c;                                    // slats
      for (let k = 0; k < 3; k++)
        ctx.fillRect(-r*0.96, -r*0.48 + k*r*0.38, r*1.92, r*0.26);
      ctx.fillStyle = "#4a4a4a";                            // metal armrests
      ctx.fillRect(-r*1.02, -r*0.5, r*0.12, r);
      ctx.fillRect( r*0.9,  -r*0.5, r*0.12, r);
      break;
    }
    case "car": { // parked car with body, glass, roof and lights
      ctx.rotate(o.rot || 0);
      const col = CAR_PAL[(seed * CAR_PAL.length) | 0];
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.beginPath(); ctx.roundRect(-r*0.64, -r*0.92, r*1.44, r*2, r*0.3); ctx.fill();
      ctx.fillStyle = shade(col, 0.72);                     // lower body / trim
      ctx.beginPath(); ctx.roundRect(-r*0.7, -r, r*1.4, r*2, r*0.32); ctx.fill();
      ctx.fillStyle = col;                                  // paintwork
      ctx.beginPath(); ctx.roundRect(-r*0.62, -r*0.94, r*1.24, r*1.88, r*0.28); ctx.fill();
      ctx.fillStyle = "rgba(30,40,55,0.85)";                // glass
      ctx.beginPath(); ctx.roundRect(-r*0.5, -r*0.55, r, r*0.42, r*0.1); ctx.fill();
      ctx.beginPath(); ctx.roundRect(-r*0.5,  r*0.28, r, r*0.34, r*0.1); ctx.fill();
      ctx.fillStyle = shade(col, 1.18);                     // roof panel catches the light
      ctx.beginPath(); ctx.roundRect(-r*0.48, -r*0.12, r*0.96, r*0.38, r*0.08); ctx.fill();
      ctx.fillStyle = "#f5e6a8";                            // headlights
      ctx.fillRect(-r*0.55, -r*0.99, r*0.24, r*0.1);
      ctx.fillRect( r*0.31, -r*0.99, r*0.24, r*0.1);
      ctx.fillStyle = "#c0392b";                            // taillights
      ctx.fillRect(-r*0.55, r*0.9, r*0.24, r*0.09);
      ctx.fillRect( r*0.31, r*0.9, r*0.24, r*0.09);
      break;
    }
    case "tree": { // layered canopy, size varies per tree
      const rr = r * (0.85 + seed * 0.3);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath(); ctx.ellipse(rr*0.22, rr*0.26, rr*0.95, rr*0.8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = shade(c, 0.62);                       // shaded under-canopy
      ctx.beginPath(); ctx.arc(0, 0, rr*0.92, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.arc(-rr*0.08, -rr*0.1, rr*0.78, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = shade(c, 1.25);                       // sun-lit clumps
      const ta = seed * Math.PI * 2;
      for (let k = 0; k < 3; k++) {
        const a = ta + k * 2.3;
        ctx.beginPath();
        ctx.arc(-rr*0.12 + Math.cos(a)*rr*0.3, -rr*0.14 + Math.sin(a)*rr*0.3, rr*0.24, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case "bldg": { // small building — 2.5-D: roof offset up-left, walls below-right
      const w = r*2, lift = r*0.5;
      ctx.fillStyle = "rgba(0,0,0,0.22)";                   // ground shadow
      ctx.fillRect(-r + lift*0.35, -r + lift*0.4, w, w);
      ctx.fillStyle = shade(c, 0.52);                       // walls (footprint)
      ctx.fillRect(-r, -r, w, w);
      ctx.fillStyle = "rgba(255,240,190,0.85)";             // lit ground-floor windows
      const ww = w / 6;
      for (let k = 0; k < 3; k++)
        ctx.fillRect(-r + ww*(k*2 + 0.5), r - lift*0.72, ww, lift*0.4);
      const rx = -r - lift*0.35, ry = -r - lift;            // roof slab
      ctx.fillStyle = shade(c, 0.95);
      ctx.fillRect(rx, ry, w, w);
      ctx.strokeStyle = shade(c, 1.25); ctx.lineWidth = 2;  // parapet
      ctx.strokeRect(rx + 1.5, ry + 1.5, w - 3, w - 3);
      ctx.fillStyle = shade(c, 1.15);                       // AC unit
      ctx.fillRect(rx + w*(0.12 + seed*0.15), ry + w*0.16, w*0.26, w*0.2);
      ctx.fillStyle = "rgba(0,0,0,0.25)";                   // vent
      ctx.beginPath(); ctx.arc(rx + w*0.68, ry + w*0.62, w*0.09, 0, Math.PI*2); ctx.fill();
      break;
    }
    case "tall": { // tower — taller extrusion, helipad + roof plant
      const w = r*1.56, hgt = r*2, lift = r*0.85;
      const x0 = -w/2, y0 = -r;
      ctx.fillStyle = "rgba(0,0,0,0.25)";                   // ground shadow
      ctx.fillRect(x0 + lift*0.4, y0 + lift*0.45, w, hgt);
      ctx.fillStyle = shade(c, 0.48);                       // walls
      ctx.fillRect(x0, y0, w, hgt);
      ctx.fillStyle = "rgba(255,240,190,0.8)";              // two window rows on the wall
      const tw = w / 6;
      for (let row = 0; row < 2; row++)
        for (let k = 0; k < 3; k++)
          ctx.fillRect(x0 + tw*(k*2 + 0.5), r - lift*(0.85 - row*0.42), tw*0.9, lift*0.26);
      const rx = x0 - lift*0.4, ry = y0 - lift;             // roof slab
      ctx.fillStyle = shade(c, 0.92);
      ctx.fillRect(rx, ry, w, hgt);
      ctx.strokeStyle = shade(c, 1.22); ctx.lineWidth = 2;
      ctx.strokeRect(rx + 2, ry + 2, w - 4, hgt - 4);
      ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 2;  // helipad ring
      ctx.beginPath(); ctx.arc(rx + w/2, ry + hgt*0.3, w*0.2, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = shade(c, 1.15);                       // roof plant
      ctx.fillRect(rx + w*0.18, ry + hgt*0.62, w*0.28, hgt*0.12);
      ctx.fillRect(rx + w*0.56, ry + hgt*0.72, w*0.2,  hgt*0.1);
      break;
    }
  }
  ctx.restore();
}

function drawObjects() {
  for (let i = 0; i < objs.length; i++) {
    const o = objs[i];
    if (o.eaten && !o.swallowing) continue;

    if (o.swallowing) {
      const t = o.swallowT / o.swallowDur;
      const ease = 1 - (1-t)*(1-t);
      // interpolate in world space toward the hole
      const wx = o.sx + (o.swallowHole.x - o.sx) * ease;
      const wy = o.sy + (o.swallowHole.y - o.sy) * ease;
      drawObj(o, wx, wy, 1 - ease * 0.95, 1 - ease);
      continue;
    }

    // World-space culling: skip if outside visible rect
    const hw = VW / (2 * zoom), hh = VH / (2 * zoom);
    if (o.x + o.r < cam.x - hw || o.x - o.r > cam.x + hw ||
        o.y + o.r < cam.y - hh || o.y - o.r > cam.y + hh) continue;
    // Pop-in scale after relocation
    const s = o.spawnAnim < 1 ? o.spawnAnim * (2 - o.spawnAnim) : 1;
    drawObj(o, o.x, o.y, s, s);
  }
}

function drawParticles() {
  for (let i = 0; i < POOL_SIZE; i++) {
    const p = particles[i];
    if (!p.active) continue;
    const frac = p.t / p.dur;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * frac, 0, Math.PI*2);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2.5 * (1 - frac);
    ctx.globalAlpha = (1 - frac) * 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawPopups() {
  // Constant screen size regardless of zoom
  const fs = 15 / zoom;
  ctx.font = `bold ${fs}px system-ui,sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "bottom";
  for (let i = 0; i < POPUP_SIZE; i++) {
    const p = popups[i];
    if (!p.active) continue;
    const frac = p.t / p.dur;
    ctx.globalAlpha = 1 - frac * frac;
    ctx.fillStyle = "#f8ec22";
    ctx.fillText(p.text, p.x, p.y - frac * (34 / zoom));
    ctx.globalAlpha = 1;
  }
}

function drawCursorMarker() {
  // Small ring where the (hidden) mouse cursor is, so desktop players can aim
  if (touch.active || !mouse.known || player.respawning) return;
  const w = screenToWorld(mouse.x, mouse.y);
  ctx.beginPath(); ctx.arc(w.x, w.y, 5 / zoom, 0, Math.PI*2);
  ctx.strokeStyle = "rgba(47,231,247,0.65)";
  ctx.lineWidth = 1.5 / zoom;
  ctx.stroke();
}

function drawHole(h) {
  if (h.respawning && h.respawnTimer > 0) return;
  const sx = h.x, sy = h.y;  // world coords; ctx transform handles screen mapping
  const hw = VW / (2 * zoom), hh = VH / (2 * zoom);
  if (sx + h.r < cam.x - hw - 20 || sx - h.r > cam.x + hw + 20 ||
      sy + h.r < cam.y - hh - 20 || sy - h.r > cam.y + hh + 20) return;

  const wobble = 1 + Math.sin(Date.now() / 250) * 0.025 + h.eatAnim;
  const dispR = h.r * wobble;

  // Outer shadow
  const glow = ctx.createRadialGradient(sx, sy, dispR * 0.5, sx, sy, dispR * 1.45);
  glow.addColorStop(0, "rgba(0,0,0,0)");
  glow.addColorStop(0.6, "rgba(0,0,0,0.14)");
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx, sy, dispR * 1.45, 0, Math.PI*2); ctx.fill();

  // Hole depth gradient
  const depth = ctx.createRadialGradient(sx - dispR*0.15, sy - dispR*0.15, dispR*0.05,
                                          sx, sy, dispR);
  depth.addColorStop(0, "#000000");
  depth.addColorStop(0.6, "#06080d");
  depth.addColorStop(1, "#0c1528");
  ctx.fillStyle = depth;
  ctx.beginPath(); ctx.arc(sx, sy, dispR, 0, Math.PI*2); ctx.fill();

  // Slow inner swirl — makes the void feel like it's churning
  {
    const t = Date.now() / 1400;
    ctx.save();
    ctx.strokeStyle = "rgba(45,75,130,0.32)";
    ctx.lineWidth = Math.max(1.5, dispR * 0.04);
    for (let k = 0; k < 3; k++) {
      const a = t + k * (Math.PI * 2 / 3);
      ctx.beginPath();
      ctx.arc(sx, sy, dispR * (0.32 + k * 0.19), a, a + Math.PI * 1.2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Coloured rim
  const rimW = Math.max(2.5, dispR * 0.065);
  ctx.beginPath(); ctx.arc(sx, sy, dispR, 0, Math.PI*2);
  ctx.strokeStyle = h.color; ctx.lineWidth = rimW; ctx.stroke();

  // Growth progress ring (player only)
  if (h.isPlayer) {
    const prog = getTierProgress(h.r);
    const startAngle = -Math.PI / 2;
    ctx.beginPath();
    ctx.arc(sx, sy, dispR + rimW + 2, startAngle, startAngle + prog * Math.PI * 2);
    ctx.strokeStyle = "rgba(47,231,247,0.55)"; ctx.lineWidth = 3; ctx.stroke();
  }

  // Name label — clamp in SCREEN px so it stays readable when zoomed out
  const fontSize = clamp(dispR * 0.28 * zoom, 9, 13) / zoom;
  ctx.font = `bold ${fontSize}px system-ui,sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "bottom";
  ctx.fillStyle = "rgba(255,255,255,0.88)";
  ctx.fillText(h.name, sx, sy - dispR - rimW - 3);
}

function drawHoles() {
  const sorted = holes.slice().sort((a, b) => a.r - b.r);
  for (let i = 0; i < sorted.length; i++) drawHole(sorted[i]);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  const mins = (timeLeft / 60) | 0;
  const secs = timeLeft % 60 | 0;
  const timerEl = document.getElementById("timer");
  timerEl.textContent = mins + ":" + (secs < 10 ? "0" : "") + secs;
  timerEl.classList.toggle("low", timeLeft <= 10.5 && timeLeft > 0);
  document.getElementById("score").textContent = player.score;

  const sorted = holes.slice().sort((a, b) => b.r - a.r);
  const sb = document.getElementById("scoreboard");
  let html = "";
  for (let i = 0; i < Math.min(sorted.length, 5); i++) {
    const h = sorted[i];
    const rank = i + 1;
    const isMe = h.isPlayer;
    const rad = h.r | 0;
    html += `<div class="sb-row${isMe ? " sb-you" : ""}">${rank}. ${h.name} <b>${rad}</b></div>`;
  }
  sb.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── TIER BANNER ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
let lastTier = 0;
let bannerTimer = 0;
const banner = document.getElementById("tier-banner");

function checkTierUp() {
  const t = getTier(player.r);
  if (t > lastTier) {
    lastTier = t;
    banner.textContent = `⬆ ${CFG.tierNames[t]} tier unlocked!`;
    banner.style.opacity = "1";
    bannerTimer = 2.2;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ── RESPAWN ───────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const respawnNotice = document.getElementById("respawn-notice");
const respawnCount  = document.getElementById("respawn-count");

function respawnPlayer(hole) {
  hole.respawning = true;
  hole.respawnTimer = CFG.respawnTime;
  hole.r = Math.max(CFG.playerStartR, hole.r * CFG.respawnRFraction);
  hole.score = Math.floor(hole.score * 0.8);
  lastTier = getTier(hole.r); // re-announce tiers regained after the size loss

  // Find safe spawn position
  let bx = 0, by = 0;
  let tries = 0;
  do {
    bx = CFG.roadW/2 + Math.random() * (CFG.mapW - CFG.roadW);
    by = CFG.roadW/2 + Math.random() * (CFG.mapH - CFG.roadW);
    tries++;
  } while (tries < 20 && holes.some(h => !h.isPlayer && !h.respawning &&
      (h.x-bx)*(h.x-bx) + (h.y-by)*(h.y-by) < 300*300));
  hole.x = bx; hole.y = by;
  respawnNotice.style.display = "block";
}

// ══════════════════════════════════════════════════════════════════════════════
// ── GAME LOOP ─────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
let rafId = null;
let lastTs = 0;
let paused = false;

document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
  if (!paused) lastTs = 0; // reset dt on resume to avoid big jump
});

function loop(ts) {
  rafId = requestAnimationFrame(loop);
  if (paused || gameOver) return;

  const dt = lastTs ? Math.min((ts - lastTs) / 1000, CFG.maxDt) : 0.016;
  lastTs = ts;

  // ── Update time ────────────────────────────────────────────────────────────
  if (!player.respawning) {
    timeLeft -= dt;
    if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
  }

  // ── Update respawn timer ───────────────────────────────────────────────────
  if (player.respawning) {
    player.respawnTimer -= dt;
    const cnt = Math.ceil(player.respawnTimer);
    respawnCount.textContent = `Respawning in ${cnt}…`;
    if (player.respawnTimer <= 0) {
      player.respawning = false;
      respawnNotice.style.display = "none";
    }
  }

  // ── Player movement ────────────────────────────────────────────────────────
  if (!player.respawning) {
    const inp = getPlayerInput();
    if (inp) moveHole(player, inp.x, inp.y, dt);
    checkEating(player);
    checkTierUp();
  }

  // ── AI ─────────────────────────────────────────────────────────────────────
  for (let i = 1; i < holes.length; i++) {
    updateAI(holes[i], dt);
    checkEating(holes[i]);
  }

  // ── Pedestrians ────────────────────────────────────────────────────────────
  updatePedestrians(dt);

  // ── Hole-hole collisions ───────────────────────────────────────────────────
  checkHoleCollisions();

  // ── Swallow animation / object respawn / pop-in ────────────────────────────
  for (let i = 0; i < objs.length; i++) {
    const o = objs[i];
    if (o.spawnAnim < 1) o.spawnAnim = Math.min(1, o.spawnAnim + dt * 3);
    if (o.swallowing) {
      o.swallowT += dt;
      if (o.swallowT >= o.swallowDur) {
        o.swallowing = false;
        const h = o.swallowHole;
        // Area-based growth: big holes gain less radius per object, so the
        // late game can't spiral into a screen-filling black disc.
        h.r = Math.sqrt(h.r * h.r + CFG.growthFactor * o.origR * o.origR);
        h.score += o.pts;
        if (h.isPlayer) spawnPopup(h.x, h.y - h.r, "+" + o.pts);
        o.respawnT = CFG.objRespawnMin + Math.random() * (CFG.objRespawnMax - CFG.objRespawnMin);
      }
    } else if (o.eaten) {
      // Waiting to reappear elsewhere
      o.respawnT -= dt;
      if (o.respawnT <= 0 && !relocateObj(o)) o.respawnT = 2; // retry shortly
    }
  }

  // ── Popup update ───────────────────────────────────────────────────────────
  for (let i = 0; i < POPUP_SIZE; i++) {
    const p = popups[i];
    if (!p.active) continue;
    p.t += dt; if (p.t >= p.dur) p.active = false;
  }

  // ── Particle update ────────────────────────────────────────────────────────
  for (let i = 0; i < POOL_SIZE; i++) {
    const p = particles[i];
    if (!p.active) continue;
    p.t += dt; if (p.t >= p.dur) p.active = false;
    p.r = p.maxR * (p.t / p.dur);
  }

  // ── Eat-anim decay ─────────────────────────────────────────────────────────
  for (let i = 0; i < holes.length; i++) {
    if (holes[i].eatAnim > 0) holes[i].eatAnim = Math.max(0, holes[i].eatAnim - dt * 1.2);
  }

  // ── Banner fade ────────────────────────────────────────────────────────────
  if (bannerTimer > 0) {
    bannerTimer -= dt;
    if (bannerTimer <= 0) banner.style.opacity = "0";
  }

  // ── Map expansion (keeps the biggest hole from being pinned by the edges) ──
  expandMap();

  // ── Zoom (tracks player size; starts at 1.0 and immediately decreases on growth) ──
  {
    let tz = clamp(CFG.zoomRef / Math.max(player.r, CFG.zoomRef), CFG.minZoom, 1.0);
    // Hard cap: past minZoom the hole would otherwise keep growing on screen
    // until it blacked out the whole viewport — never let it exceed this size.
    const maxScreenR = Math.min(VW, VH) * CFG.maxHoleScreenFrac;
    if (player.r * tz > maxScreenR) tz = maxScreenR / player.r;
    zoom += (tz - zoom) * Math.min(1, dt * 3);
  }

  // ── Camera: tracks player (world center of viewport) with spring ────────────
  {
    const lf = Math.min(1, CFG.camLerp * dt);
    cam.x += (player.x - cam.x) * lf;
    cam.y += (player.y - cam.y) * lf;
    // Soft-clamp so the viewport doesn't show beyond the map edges
    const hw = VW / (2 * zoom), hh = VH / (2 * zoom);
    cam.x = clamp(cam.x, hw, Math.max(hw, CFG.mapW - hw));
    cam.y = clamp(cam.y, hh, Math.max(hh, CFG.mapH - hh));
  }

  // ── Render: center-pivot transform ─────────────────────────────────────────
  // screen = (world - cam) * zoom + viewport_center
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.translate(VW / 2, VH / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-cam.x, -cam.y);
  drawMap();
  drawObjects();
  drawParticles();
  drawHoles();
  drawPopups();
  drawCursorMarker();
  ctx.restore();

  // Screen-space vignette pulls focus to the centre of the action
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, VW, VH);
  ctx.restore();

  updateHUD();
}

// ══════════════════════════════════════════════════════════════════════════════
// ── GAME END ──────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function endGame() {
  gameOver = true;
  respawnNotice.style.display = "none";

  const sorted = holes.slice().sort((a, b) => b.r - a.r);
  const rank = sorted.findIndex(h => h.isPlayer) + 1;
  const suffix = rank === 1 ? "st" : rank === 2 ? "nd" : rank === 3 ? "rd" : "th";

  const best = parseInt(tryLoad("chasm-best") || "0", 10);
  if (player.score > best) tryStore("chasm-best", player.score);
  const newBest = parseInt(tryLoad("chasm-best") || "0", 10);

  let tname = CFG.tierNames[getTier(player.r)] || "Pebble";
  document.getElementById("ov-stats").textContent =
    `You came ${rank}${suffix} · Score: ${player.score} · Best: ${newBest} · Tier: ${tname}`;

  document.getElementById("overlay").className = "overlay show";
}

// ══════════════════════════════════════════════════════════════════════════════
// ── INIT / RESET ──────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function newGame() {
  document.getElementById("overlay").className = "overlay";
  respawnNotice.style.display = "none";
  banner.style.opacity = "0";
  bannerTimer = 0; lastTier = 0; zoom = 1;
  CFG.mapW = CFG.baseMapW; CFG.mapH = CFG.baseMapH; blockShift = 0;

  // Reset particle + popup pools
  for (let i = 0; i < POOL_SIZE; i++) particles[i].active = false;
  for (let i = 0; i < POPUP_SIZE; i++) popups[i].active = false;

  // Build world objects and spatial grid
  objs = placeObjects();
  grid = new SpatialGrid(CFG.mapW, CFG.mapH, 120);
  for (let i = 0; i < objs.length; i++) grid.insert(objs[i]);

  // Place holes (player + AI)
  const cx = CFG.mapW / 2, cy = CFG.mapH / 2;
  player = makeHole(cx, cy, CFG.playerStartR, true, "You", "#2fe7f7");
  holes  = [player];

  const spread = 600;
  for (let i = 0; i < CFG.aiCount; i++) {
    const angle = (i / CFG.aiCount) * Math.PI * 2 + Math.PI / 4;
    const dist  = 350 + Math.random() * spread;
    const ax = clamp(cx + Math.cos(angle) * dist, 100, CFG.mapW - 100);
    const ay = clamp(cy + Math.sin(angle) * dist, 100, CFG.mapH - 100);
    const ar = CFG.playerStartR * (0.8 + Math.random() * 0.5);
    holes.push(makeHole(ax, ay, ar, false, CFG.aiNames[i], CFG.aiColors[i]));
  }

  cam = { x: cx, y: cy };  // world center of viewport (equals player start)
  timeLeft = CFG.roundTime;
  gameOver = false;
  lastTs   = 0;
}

// ── Start ──────────────────────────────────────────────────────────────────────
bestScore = parseInt(tryLoad("chasm-best") || "0", 10);
document.getElementById("btn-replay").addEventListener("click", newGame);

newGame();
if (rafId) cancelAnimationFrame(rafId);
rafId = requestAnimationFrame(loop);

// ── PWA ────────────────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("../../sw.js"));
</script>
</body>
